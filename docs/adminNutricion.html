<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Nutrición - Core Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col lg:flex-row">
        <!-- Form Sidebar -->
        <aside class="w-full lg:w-[450px] bg-white border-r border-slate-200 min-h-screen p-8 lg:sticky lg:top-16 lg:h-[calc(100vh-64px)] overflow-y-auto">
            <div class="mb-10">
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Editor de Recetas</h2>
                <p class="text-slate-500 text-sm">Crea y publica contenido nutricional para tu plataforma.</p>
            </div>

            <form id="recipe-form" class="space-y-8">
                <!-- Image Upload -->
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em]">Imagen de la receta</label>
                    <div id="drop-zone" class="w-full h-44 border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center text-slate-400 hover:border-blue-500 hover:bg-blue-50/30 transition-all cursor-pointer overflow-hidden group bg-slate-50 relative">
                        <div id="drop-placeholder" class="text-center p-6">
                            <i class="fas fa-image text-3xl mb-3 group-hover:scale-110 transition-transform"></i>
                            <p class="text-[10px] font-bold uppercase tracking-widest">Sube una imagen</p>
                            <p class="text-[9px] mt-1 opacity-60">PNG, JPG hasta 5MB</p>
                        </div>
                        <img id="preview-image" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Título</label>
                        <input type="text" id="title" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="Ej: Bowl de Quinoa y Pollo">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Categoría</label>
                            <select id="category" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option>Desayuno</option>
                                <option>Almuerzo</option>
                                <option>Cena</option>
                                <option>Postre Fitness</option>
                                <option>Snack Proteico</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Dieta</label>
                            <select id="diet_type" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option>Equilibrada</option>
                                <option>Keto</option>
                                <option>Vegana</option>
                                <option>Alta Proteína</option>
                                <option>Sin Gluten</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <label class="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Prote (g)</label>
                            <input type="number" id="protein" class="w-full bg-transparent text-center font-bold border-none focus:ring-0 p-0 text-slate-700">
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <label class="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Carbs (g)</label>
                            <input type="number" id="carbs" class="w-full bg-transparent text-center font-bold border-none focus:ring-0 p-0 text-slate-700">
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <label class="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Grasas (g)</label>
                            <input type="number" id="fats" class="w-full bg-transparent text-center font-bold border-none focus:ring-0 p-0 text-slate-700">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Calorías</label>
                            <input type="number" id="calories" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Prep Time</label>
                            <input type="text" id="prep_time" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="20 min">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Dificultad</label>
                        <select id="difficulty" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                            <option>Fácil</option>
                            <option>Media</option>
                            <option>Avanzada</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Ingredientes</label>
                        <textarea id="ingredients" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium resize-none" placeholder="Lista de ingredientes..."></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Preparación</label>
                        <textarea id="instructions" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium resize-none" placeholder="Pasos a seguir..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-bold uppercase tracking-widest text-xs shadow-xl shadow-slate-200 hover:bg-blue-600 transition-all active:scale-95">
                    <span id="btn-text">Publicar Contenido</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-spinner animate-spin mr-2"></i> Procesando...</span>
                </button>
            </form>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-grow p-8 lg:p-12">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-4">
                <h2 class="text-3xl font-bold text-slate-900">Inventario Nutricional</h2>
                <div class="flex items-center text-xs font-bold text-slate-400 uppercase tracking-widest bg-white px-4 py-2 rounded-xl border border-slate-200">
                    <span id="recipe-count" class="text-blue-600 mr-2">0</span> Recetas publicadas
                </div>
            </div>

            <div id="recipes-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <!-- Dynamic Content -->
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase, uploadToCloudinary, setupDragAndDrop, renderNavbar, Auth, showPopup, showConfirm } from './js/utils.js';
        renderNavbar();
        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner']);
        if (currentUser) {
            initPage();
        }

        function initPage() {
        const form = document.getElementById('recipe-form');
        const list = document.getElementById('recipes-list');
        const dropZone = document.getElementById('drop-zone');
        const imageInput = document.getElementById('image-input');
        const previewImage = document.getElementById('preview-image');
        const dropPlaceholder = document.getElementById('drop-placeholder');

        setupDragAndDrop(dropZone, imageInput, (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                dropPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const diet_type = document.getElementById('diet_type').value;
                const protein = document.getElementById('protein').value;
                const carbs = document.getElementById('carbs').value;
                const fats = document.getElementById('fats').value;
                const calories = document.getElementById('calories').value;
                const prep_time = document.getElementById('prep_time').value;
                const difficulty = document.getElementById('difficulty').value;
                const ingredients = document.getElementById('ingredients').value;
                const instructions = document.getElementById('instructions').value;
                const imageFile = imageInput.files[0];

                let imageUrl = '';
                if (imageFile) imageUrl = await uploadToCloudinary(imageFile);

                // FORCE SYNC
                await supabase.rpc('create_profile_if_missing', {
                    p_id: currentUser.id,
                    p_email: currentUser.email,
                    p_full_name: currentUser.full_name || '',
                    p_domain: currentUser.domain || null,
                    p_role: currentUser.role || 'gym-owner',
                    p_owner_id: currentUser.owner_id || null
                });

                const { error } = await supabase.from('gym_recipes').insert([{
                    title, category, diet_type,
                    protein: parseInt(protein) || 0,
                    carbs: parseInt(carbs) || 0,
                    fats: parseInt(fats) || 0,
                    calories: parseInt(calories) || 0,
                    prep_time, difficulty, ingredients, instructions, image_url: imageUrl,
                    owner_id: currentUser.id
                }]);

                if (error) throw error;
                await showPopup('Éxito', 'Receta publicada correctamente');
                location.reload();
            } catch (err) {
                await showPopup('Error', err.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        async function fetchRecipes() {
            let query = supabase.from('gym_recipes').select('*').order('created_at', { ascending: false });

            if (currentUser.role === 'gym-owner') {
                query = query.eq('owner_id', currentUser.id);
            }

            const { data, error } = await query;
            if (error) return;

            document.getElementById('recipe-count').innerText = data.length;

            list.innerHTML = data.map(r => `
                <div class="bg-white rounded-[32px] shadow-sm border border-slate-200 overflow-hidden group hover:shadow-xl transition-all duration-300">
                    <div class="h-56 relative overflow-hidden bg-slate-100">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=400'}"
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        <span class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest text-slate-700 border border-slate-200">${r.diet_type}</span>
                    </div>
                    <div class="p-8">
                        <h4 class="font-bold text-slate-900 text-lg mb-4 truncate">${r.title}</h4>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Calorías</p>
                                <p class="text-sm font-bold text-slate-700">${r.calories || 0}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Proteínas</p>
                                <p class="text-sm font-bold text-slate-700">${r.protein || 0}g</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between pt-6 border-t border-slate-100">
                             <button onclick="deleteRecipe(${r.id})" class="text-[10px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">
                                <i class="fas fa-trash-alt mr-2"></i> Eliminar
                             </button>
                             <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${r.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.deleteRecipe = async (id) => {
            if (await showConfirm('¿Borrar receta?', 'Esta acción no se puede deshacer.')) {
                await supabase.from('gym_recipes').delete().eq('id', id);
                fetchRecipes();
            }
        }
        fetchRecipes();
        }
    </script>
</body>
</html>
