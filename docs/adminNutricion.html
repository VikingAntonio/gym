<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Nutrición Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col lg:flex-row">
        <!-- Sidebar / Form -->
        <aside class="w-full lg:w-1/3 bg-white border-r min-h-screen p-6 lg:sticky lg:top-16 lg:h-[calc(100vh-64px)] overflow-y-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                <i class="fas fa-carrot text-emerald-500 mr-2"></i> Nueva Receta
            </h2>

            <form id="recipe-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre del Platillo</label>
                    <input type="text" id="title" required class="input-field" placeholder="Ej: Bowl de Quinoa">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Categoría</label>
                        <select id="category" class="input-field">
                            <option>Desayuno</option>
                            <option>Almuerzo</option>
                            <option>Cena</option>
                            <option>Snack</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Calorías</label>
                        <input type="number" id="calories" class="input-field" placeholder="450">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Proteína (g)</label>
                        <input type="number" id="protein" class="input-field text-sm px-2">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Carbos (g)</label>
                        <input type="number" id="carbs" class="input-field text-sm px-2">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Grasas (g)</label>
                        <input type="number" id="fats" class="input-field text-sm px-2">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Imagen del Platillo</label>
                    <input type="file" id="image" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-emerald-50 file:text-emerald-700">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ingredientes</label>
                    <textarea id="ingredients" rows="3" class="input-field text-sm" placeholder="Listado de ingredientes..."></textarea>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Preparación</label>
                    <textarea id="instructions" rows="4" class="input-field text-sm" placeholder="Pasos detallados..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary w-full bg-emerald-600 hover:bg-emerald-700 mt-6 py-3">
                    <span id="btn-text">Publicar Receta</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-circle-notch animate-spin mr-2"></i> Guardando...</span>
                </button>
            </form>
        </aside>

        <!-- Main View / List -->
        <main class="w-full lg:w-2/3 p-8">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">Recetario Actual</h2>
            <div id="recipes-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </main>
    </div>

    <script type="module">
        import { supabase, uploadToCloudinary, renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('recipe-form');
        const list = document.getElementById('recipes-list');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const calories = document.getElementById('calories').value;
                const protein = document.getElementById('protein').value;
                const carbs = document.getElementById('carbs').value;
                const fats = document.getElementById('fats').value;
                const ingredients = document.getElementById('ingredients').value;
                const instructions = document.getElementById('instructions').value;
                const imageFile = document.getElementById('image').files[0];

                let imageUrl = '';
                if (imageFile) imageUrl = await uploadToCloudinary(imageFile);

                const { error } = await supabase.from('gym_recipes').insert([{
                    title, category, calories, protein, carbs, fats, ingredients, instructions, image_url: imageUrl
                }]);

                if (error) throw error;
                alert('¡Receta guardada!');
                location.reload();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        async function fetchRecipes() {
            const { data, error } = await supabase.from('gym_recipes').select('*').order('created_at', { ascending: false });
            if (error) return;

            list.innerHTML = data.map(r => `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="h-40 bg-slate-100 relative">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=400'}"
                             class="w-full h-full object-cover">
                        <span class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded text-[10px] font-bold uppercase shadow-sm">${r.category}</span>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-slate-800 mb-1">${r.title}</h4>
                        <div class="flex space-x-3 text-[10px] font-bold text-slate-400 mb-4">
                            <span>🔥 ${r.calories || 0} kcal</span>
                            <span>🍖 P: ${r.protein || 0}g</span>
                            <span>🥖 C: ${r.carbs || 0}g</span>
                        </div>
                        <button onclick="deleteRecipe(${r.id})" class="text-xs text-red-400 hover:text-red-600 font-bold transition">
                            <i class="fas fa-trash-alt mr-1"></i> ELIMINAR
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.deleteRecipe = async (id) => {
            if (confirm('¿Borrar receta?')) {
                await supabase.from('gym_recipes').delete().eq('id', id);
                fetchRecipes();
            }
        }
        fetchRecipes();
    </script>
</body>
</html>
