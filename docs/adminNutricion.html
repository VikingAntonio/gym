<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Ultra Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col lg:flex-row">
        <!-- Ultra Form -->
        <aside class="w-full lg:w-1/3 bg-white border-r min-h-screen p-8 lg:sticky lg:top-16 lg:h-[calc(100vh-64px)] overflow-y-auto">
            <div class="mb-10">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight mb-2">Chef Ultra Pro</h2>
                <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">Nutrición de Élite</p>
            </div>

            <form id="recipe-form" class="space-y-6">
                <!-- Drag & Drop -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Imagen del Platillo (Drag & Drop)</label>
                    <div id="drop-zone" class="w-full h-40 border-2 border-dashed border-slate-200 rounded-[30px] flex flex-col items-center justify-center text-slate-400 hover:border-emerald-400 hover:text-emerald-500 transition-all cursor-pointer overflow-hidden group bg-slate-50">
                        <div id="drop-placeholder" class="text-center p-4">
                            <i class="fas fa-utensils text-2xl mb-2 group-hover:rotate-12 transition-transform"></i>
                            <p class="text-[10px] font-black uppercase tracking-widest">Sube tu creación</p>
                        </div>
                        <img id="preview-image" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Nombre de la Receta</label>
                        <input type="text" id="title" required class="input-field" placeholder="Ej: Salmon al Eneldo con Espárragos">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Categoría</label>
                            <select id="category" class="input-field">
                                <option>Desayuno</option>
                                <option>Almuerzo</option>
                                <option>Cena</option>
                                <option>Postre Fitness</option>
                                <option>Snack Proteico</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Tipo de Dieta</label>
                            <select id="diet_type" class="input-field">
                                <option>Equilibrada</option>
                                <option>Keto</option>
                                <option>Vegana</option>
                                <option>Alta Proteína</option>
                                <option>Sin Gluten</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Prote (g)</label>
                            <input type="number" id="protein" class="w-full bg-transparent text-center font-black border-none focus:ring-0 p-0 text-sm">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Carbs (g)</label>
                            <input type="number" id="carbs" class="w-full bg-transparent text-center font-black border-none focus:ring-0 p-0 text-sm">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="block text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Grasas (g)</label>
                            <input type="number" id="fats" class="w-full bg-transparent text-center font-black border-none focus:ring-0 p-0 text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Calorías Totales</label>
                            <input type="number" id="calories" class="input-field" placeholder="500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Tiempo Prep</label>
                            <input type="text" id="prep_time" class="input-field" placeholder="15 min">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Dificultad</label>
                        <select id="difficulty" class="input-field">
                            <option>Fácil</option>
                            <option>Media</option>
                            <option>Pro</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Ingredientes Clave</label>
                        <textarea id="ingredients" rows="3" class="input-field text-sm" placeholder="1 x Salmon (200g)..."></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Instrucciones Paso a Paso</label>
                        <textarea id="instructions" rows="5" class="input-field text-sm" placeholder="1. Calienta la sartén..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-emerald-600 text-white rounded-[30px] font-black uppercase tracking-widest text-sm shadow-xl hover:bg-emerald-700 transition-all">
                    <span id="btn-text">Publicar Receta Ultra</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-spinner animate-spin mr-2"></i> Cocinando...</span>
                </button>
            </form>
        </aside>

        <!-- Recipe Inventory -->
        <main class="flex-grow p-8 lg:p-12">
            <h2 class="text-4xl font-black text-slate-900 mb-10 tracking-tight italic">Menú <span class="not-italic text-emerald-500">PRO</span></h2>
            <div id="recipes-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <!-- Dinámico -->
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase, uploadToCloudinary, setupDragAndDrop, renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('recipe-form');
        const list = document.getElementById('recipes-list');
        const dropZone = document.getElementById('drop-zone');
        const imageInput = document.getElementById('image-input');
        const previewImage = document.getElementById('preview-image');
        const dropPlaceholder = document.getElementById('drop-placeholder');

        setupDragAndDrop(dropZone, imageInput, (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                dropPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const diet_type = document.getElementById('diet_type').value;
                const protein = document.getElementById('protein').value;
                const carbs = document.getElementById('carbs').value;
                const fats = document.getElementById('fats').value;
                const calories = document.getElementById('calories').value;
                const prep_time = document.getElementById('prep_time').value;
                const difficulty = document.getElementById('difficulty').value;
                const ingredients = document.getElementById('ingredients').value;
                const instructions = document.getElementById('instructions').value;
                const imageFile = imageInput.files[0];

                let imageUrl = '';
                if (imageFile) imageUrl = await uploadToCloudinary(imageFile);

                const { error } = await supabase.from('gym_recipes').insert([{
                    title, category, diet_type, protein, carbs, fats, calories, prep_time, difficulty, ingredients, instructions, image_url: imageUrl
                }]);

                if (error) throw error;
                alert('¡Receta Ultra Publicada!');
                location.reload();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        async function fetchRecipes() {
            const { data, error } = await supabase.from('gym_recipes').select('*').order('created_at', { ascending: false });
            if (error) return;

            list.innerHTML = data.map(r => `
                <div class="bg-white rounded-[40px] shadow-sm border overflow-hidden group hover:shadow-2xl hover:-translate-y-2 transition-all duration-500">
                    <div class="h-48 relative overflow-hidden">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=400'}"
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <span class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest text-emerald-600">${r.diet_type}</span>
                    </div>
                    <div class="p-6">
                        <h4 class="font-black text-slate-800 text-lg mb-2 truncate">${r.title}</h4>
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 mb-6">
                            <span>⏱ ${r.prep_time || '20m'}</span>
                            <span>⚖️ ${r.calories || 0} kcal</span>
                            <span>⚡ ${r.difficulty}</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="deleteRecipe(${r.id})" class="flex-grow py-3 bg-slate-50 text-[10px] font-black uppercase text-red-400 rounded-2xl hover:bg-red-50 transition-colors">Borrar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.deleteRecipe = async (id) => {
            if (confirm('¿Borrar receta?')) {
                await supabase.from('gym_recipes').delete().eq('id', id);
                fetchRecipes();
            }
        }
        fetchRecipes();
    </script>
</body>
</html>
