<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Entrenadores - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <nav id="main-nav"></nav>

    <header class="bg-slate-800 py-10 text-white text-center">
        <h1 class="text-3xl font-bold">Administrar Entrenadores</h1>
        <p class="mt-2 text-slate-400">Gestiona los perfiles de los profesionales.</p>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <form id="trainer-form" class="bg-white p-8 rounded-xl shadow-lg space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Nombre del Entrenador</label>
                <input type="text" id="name" required class="input-field" placeholder="Ej: Juan Pérez">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Especialidad</label>
                    <input type="text" id="specialty" required class="input-field" placeholder="Ej: Powerlifting, Yoga...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Contacto (Email/WhatsApp)</label>
                    <input type="text" id="contact_info" required class="input-field" placeholder="Ej: +34 600 000 000">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Foto de Perfil</label>
                <input type="file" id="image" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Bio / Experiencia</label>
                <textarea id="bio" rows="4" required class="input-field" placeholder="Breve biografía y experiencia..."></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full bg-green-600 hover:bg-green-700">
                <span id="btn-text">Guardar Entrenador</span>
                <span id="btn-loading" class="hidden">Guardando...</span>
            </button>
            <div id="message" class="text-center mt-4 hidden"></div>
        </form>
    </main>

    <script type="module">
        import { supabase, uploadToCloudinary, renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('trainer-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            messageDiv.className = "text-center mt-4 hidden";

            try {
                const name = document.getElementById('name').value;
                const specialty = document.getElementById('specialty').value;
                const contact_info = document.getElementById('contact_info').value;
                const bio = document.getElementById('bio').value;
                const imageFile = document.getElementById('image').files[0];

                let imageUrl = '';
                if (imageFile) {
                    imageUrl = await uploadToCloudinary(imageFile);
                }

                const { data, error } = await supabase
                    .from('gym_trainers')
                    .insert([{
                        name,
                        specialty,
                        contact_info,
                        bio,
                        image_url: imageUrl
                    }]);

                if (error) throw error;

                messageDiv.textContent = "¡Entrenador guardado con éxito!";
                messageDiv.className = "text-center mt-4 text-green-600 font-bold";
                messageDiv.classList.remove('hidden');
                form.reset();

            } catch (error) {
                console.error(error);
                messageDiv.textContent = "Error: " + error.message;
                messageDiv.className = "text-center mt-4 text-red-600 font-bold";
                messageDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
