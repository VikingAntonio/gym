<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Entrenadores Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col lg:flex-row">
        <!-- Sidebar / Form -->
        <aside class="w-full lg:w-1/3 bg-white border-r min-h-screen p-6 lg:sticky lg:top-16 lg:h-[calc(100vh-64px)] overflow-y-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                <i class="fas fa-user-plus text-indigo-500 mr-2"></i> Alta de Entrenador
            </h2>

            <form id="trainer-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Completo</label>
                    <input type="text" id="name" required class="input-field" placeholder="Ej: Carlos Méndez">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Especialidad</label>
                    <input type="text" id="specialty" required class="input-field" placeholder="Ej: Hipertrofia y Nutrición">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Rating inicial</label>
                        <input type="number" step="0.1" id="rating" class="input-field" placeholder="5.0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">WhatsApp/Contacto</label>
                        <input type="text" id="contact_info" class="input-field" placeholder="+52 ...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fotografía de Perfil</label>
                    <input type="file" id="image" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-indigo-50 file:text-indigo-700">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Biografía / Perfil</label>
                    <textarea id="bio" rows="4" class="input-field text-sm" placeholder="Resumen de experiencia..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary w-full bg-indigo-600 hover:bg-indigo-700 mt-6 py-3">
                    <span id="btn-text">Agregar al Equipo</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-circle-notch animate-spin mr-2"></i> Guardando...</span>
                </button>
            </form>
        </aside>

        <!-- Main View / List -->
        <main class="w-full lg:w-2/3 p-8">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">Nuestros Entrenadores</h2>
            <div id="trainers-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script type="module">
        import { supabase, uploadToCloudinary, renderNavbar, Auth, showPopup, showConfirm } from './js/utils.js';
        renderNavbar();

        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner']);
        if (currentUser) {
            initPage();
        }

        function initPage() {
        const form = document.getElementById('trainer-form');
        const list = document.getElementById('trainers-list');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const name = document.getElementById('name').value;
                const specialty = document.getElementById('specialty').value;
                const rating = document.getElementById('rating').value;
                const contact_info = document.getElementById('contact_info').value;
                const bio = document.getElementById('bio').value;
                const imageFile = document.getElementById('image').files[0];

                let imageUrl = '';
                if (imageFile) imageUrl = await uploadToCloudinary(imageFile);

                // FORCE SYNC: Ensure owner exists in gym_users before insert to avoid FK error
                const { error: syncError } = await supabase.rpc('create_profile_if_missing', {
                    p_id: currentUser.id,
                    p_email: currentUser.email,
                    p_full_name: currentUser.full_name || '',
                    p_domain: currentUser.domain || null,
                    p_role: currentUser.role || 'gym-owner',
                    p_owner_id: currentUser.owner_id || null
                });

                if (syncError) {
                    console.error('Profile sync failed:', syncError);
                    throw new Error('Error de sincronización de perfil. Por favor, re-ejecuta el script SQL de Anutricion.txt en Supabase.');
                }

                const { error } = await supabase.from('gym_trainers').insert([{
                    name, specialty, rating, contact_info, bio, image_url: imageUrl,
                    owner_id: currentUser.id
                }]);

                if (error) throw error;
                await showPopup('¡Éxito!', '¡Entrenador agregado!');
                location.reload();
            } catch (err) {
                await showPopup('Error', err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        async function fetchTrainers() {
            let query = supabase.from('gym_trainers').select('*').order('created_at', { ascending: false });

            if (currentUser.role === 'gym-owner') {
                query = query.eq('owner_id', currentUser.id);
            }

            const { data, error } = await query;
            if (error) return;

            list.innerHTML = data.map(t => `
                <div class="bg-white rounded-2xl shadow-sm border p-6 flex flex-col items-center text-center">
                    <div class="w-24 h-24 rounded-full border-4 border-indigo-50 overflow-hidden mb-4">
                        <img src="${t.image_url || 'https://images.unsplash.com/photo-1597347343908-2937e7dcc560?auto=format&fit=crop&q=80&w=200'}"
                             class="w-full h-full object-cover">
                    </div>
                    <h4 class="font-bold text-lg text-slate-800">${t.name}</h4>
                    <span class="text-xs font-bold text-indigo-500 uppercase tracking-widest mb-3">${t.specialty}</span>
                    <div class="flex items-center text-yellow-400 text-xs mb-4">
                        <i class="fas fa-star mr-1"></i> ${t.rating || 5.0}
                    </div>
                    <p class="text-xs text-slate-500 mb-6 line-clamp-2">${t.bio || 'Sin biografía disponible.'}</p>
                    <button onclick="deleteTrainer(${t.id})" class="text-xs text-red-400 hover:text-red-600 transition font-bold mt-auto">
                        <i class="fas fa-user-minus mr-1"></i> ELIMINAR
                    </button>
                </div>
            `).join('');
        }

        window.deleteTrainer = async (id) => {
            if (await showConfirm('¿Eliminar entrenador?', 'Esta acción no se puede deshacer')) {
                await supabase.from('gym_trainers').delete().eq('id', id);
                fetchTrainers();
            }
        }
        fetchTrainers();
        }
    </script>
</body>
</html>
