<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <main class="container mx-auto px-4 py-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Mis Clientes</h1>
                <p class="text-slate-500 font-medium mt-1">Administración de clientes y tarjetas digitales de tu salón.</p>
            </div>
            <button id="btn-nuevo-usuario" class="btn btn-primary px-6 py-3 uppercase tracking-widest text-xs font-black shadow-lg shadow-pink-600/20 bg-pink-600 hover:bg-pink-700">
                <i class="fas fa-plus mr-2"></i> Nuevo Cliente
            </button>
        </header>

        <div class="card bg-white border-slate-200 overflow-hidden animate-fade">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Identidad</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Rol</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-list" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium italic">
                                Sincronizando clientes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Form Modal -->
        <div id="modal-usuario" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
            <div class="card bg-white w-full max-w-lg p-10 shadow-2xl animate-fade">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="modal-title" class="text-2xl font-black text-slate-900 tracking-tight uppercase">Registro de Cliente</h2>
                    <button id="close-modal" class="text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <form id="user-form" class="space-y-8">
                    <input type="hidden" id="user-id">

                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Nombre Completo</label>
                            <input type="text" id="full_name" required class="input" placeholder="Nombre y Apellidos">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Correo Electrónico</label>
                            <input type="email" id="email" required class="input" placeholder="correo@ejemplo.com">
                        </div>
                        <div id="password-group">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Contraseña</label>
                            <input type="password" id="password" class="input" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Rol</label>
                            <select id="role" class="input bg-white cursor-pointer" disabled>
                                <option value="beauty-client" selected>Cliente</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit" id="submit-btn" class="w-full btn btn-primary py-4 text-xs font-black uppercase tracking-widest shadow-xl shadow-pink-600/30 bg-pink-600 hover:bg-pink-700">
                            Guardar Cliente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, renderNavbar, Auth, showPopup, showConfirm } from './assets/js/utils.js';

        let currentUser = null;
        let loadedUsers = [];

        async function initPage() {
            try {
                renderNavbar();
                currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner', 'beauty']);
                if (!currentUser) return;

                loadUsers();
            } catch (err) {
                console.error("Fallo crítico init:", err);
            }
        }

        async function loadUsers() {
            const list = document.getElementById('users-list');
            if (!list) return;

            list.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium italic">
                <i class="fas fa-sync fa-spin mr-2 text-pink-500"></i> Sincronizando clientes...
            </td></tr>`;

            try {
                // 1. Cargar usuarios registrados en wisbe_users
                let usersQuery = supabase.from('wisbe_users').select('*').eq('business_unit', 'beauty');
                if (currentUser.role !== 'gym-admin') usersQuery = usersQuery.eq('owner_id', currentUser.id);
                const { data: registeredUsers } = await usersQuery;

                // 2. Cargar clientes desde las citas (beauty_appointments)
                let appointmentsQuery = supabase.from('beauty_appointments').select('customer_name, customer_email, customer_phone');
                if (currentUser.role !== 'gym-admin') appointmentsQuery = appointmentsQuery.eq('owner_id', currentUser.id);
                const { data: appointmentsData } = await appointmentsQuery;

                // 3. Unificar y eliminar duplicados por email
                const clientsMap = new Map();

                // Primero los de las citas (datos básicos)
                (appointmentsData || []).forEach(app => {
                    const email = app.customer_email?.toLowerCase();
                    if (!email) return;
                    clientsMap.set(email, {
                        full_name: app.customer_name,
                        email: email,
                        phone: app.customer_phone,
                        type: 'appointment'
                    });
                });

                // Luego los registrados (tienen prioridad por ser cuentas reales)
                (registeredUsers || []).forEach(user => {
                    const email = user.email?.toLowerCase();
                    if (!email) return;
                    clientsMap.set(email, {
                        id: user.id,
                        full_name: user.full_name,
                        email: email,
                        type: 'registered'
                    });
                });

                loadedUsers = Array.from(clientsMap.values());
                renderUsers(loadedUsers);
            } catch (err) {
                console.error('Load Error:', err);
                list.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-red-500 font-bold italic">
                    <i class="fas fa-exclamation-circle mb-2 block"></i> No se pudo cargar la lista.
                </td></tr>`;
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            if (!list) return;

            if (!users || users.length === 0) {
                list.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-slate-400 font-medium">No se encontraron clientes activos.</td></tr>`;
                return;
            }

            list.innerHTML = users.map(user => {
                const safeName = user.full_name || user.email || 'Cliente';
                const initial = (safeName.charAt(0) || 'C').toUpperCase();
                const isRegistered = user.type === 'registered';

                return `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-6 py-5">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full bg-pink-50 text-pink-600 flex items-center justify-center font-black mr-4 border border-pink-100">
                                    ${initial}
                                </div>
                                <div>
                                    <span class="block text-sm font-bold text-slate-800">${safeName}</span>
                                    <span class="block text-xs text-slate-400">${user.email || '—'}</span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-5">
                            <span class="px-3 py-1 ${isRegistered ? 'bg-pink-100 text-pink-600' : 'bg-slate-100 text-slate-600'} text-[10px] font-black uppercase tracking-widest rounded-full border border-pink-200">
                                ${isRegistered ? 'CUENTA WISBE' : 'DESDE CITAS'}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            ${user.phone ? `
                                <a href="https://wa.me/${user.phone.replace(/[^0-9]/g, '')}" target="_blank" class="p-2 text-emerald-500 hover:scale-110 transition-transform inline-block" title="WhatsApp">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            ` : ''}

                            ${isRegistered ? `
                                <a href="cards.html?user_id=${user.id}" class="p-2 text-slate-400 hover:text-emerald-600 transition-colors mr-2" title="Gestionar Tarjeta">
                                    <i class="fas fa-id-card"></i>
                                </a>
                                <button onclick="editUser('${user.id}')" class="p-2 text-slate-400 hover:text-pink-600 transition-colors mr-2">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteUser('${user.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                    <i class="fas fa-trash"></i>
                                </button>
                            ` : `
                                <span class="text-[8px] font-black text-slate-300 uppercase italic">Sin Cuenta</span>
                            `}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        const modal = document.getElementById('modal-usuario');
        const form = document.getElementById('user-form');

        document.getElementById('btn-nuevo-usuario').onclick = () => {
            form.reset();
            document.getElementById('user-id').value = '';
            document.getElementById('modal-title').innerText = 'Nuevo Cliente';
            document.getElementById('password-group').classList.remove('hidden');
            document.getElementById('email').disabled = false;
            modal.style.display = 'flex';
        };

        document.getElementById('close-modal').onclick = () => modal.style.display = 'none';

        window.editUser = (id) => {
            const user = loadedUsers.find(u => u.id === id);
            if (!user) return;

            document.getElementById('user-id').value = user.id;
            document.getElementById('full_name').value = user.full_name;
            document.getElementById('email').value = user.email;
            document.getElementById('email').disabled = true;
            document.getElementById('password-group').classList.add('hidden');

            document.getElementById('modal-title').innerText = 'Editar Cliente';
            modal.style.display = 'flex';
        };

        window.deleteUser = async (id) => {
            if (await showConfirm('Eliminar Cliente', '¿Estás seguro de eliminar este cliente? Esta acción no se puede deshacer.')) {
                const { error } = await supabase.from('wisbe_users').delete().eq('id', id);
                if (error) return showPopup('Error', error.message, 'error');
                showPopup('Éxito', 'Cliente eliminado');
                loadUsers();
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const email = document.getElementById('email').value;
            const userData = {
                email: email,
                full_name: document.getElementById('full_name').value,
                role: 'beauty-client',
                business_unit: 'beauty',
                owner_id: currentUser.id
            };

            if (id) {
                const { error } = await supabase.from('wisbe_users').update(userData).eq('id', id);
                if (error) return showPopup('Error', error.message, 'error');
                showPopup('Éxito', 'Perfil actualizado');
            } else {
                const password = document.getElementById('password').value;
                try {
                    const { data, error: authError } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { data: userData }
                    });
                    if (authError) throw authError;
                    showPopup('Registro Exitoso', 'El cliente debe confirmar su correo para activar el acceso.');
                } catch (err) {
                    return showPopup('Error', err.message, 'error');
                }
            }
            modal.style.display = 'none';
            loadUsers();
        };

        initPage();
    </script>
</body>
</html>
