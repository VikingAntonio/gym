<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Wisbe</title>
    <link rel="icon" type="image/png" sizes="1662x604" href="./assets/img/iconwisbe.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="neu-page min-h-screen">
    <button class="theme-toggle" id="themeToggle" title="Cambiar Tema">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <nav id="main-nav"></nav>

    <div class="container mx-auto px-4 py-12 text-center">
        <div class="mb-12 animate-fade">
            <a href="index.html">
                <img src="https://wisbe.xyz/assets/img/wisbelogo.png" class="h-20 mx-auto mb-4 filter drop-shadow-lg" alt="Wisbe Logo">
            </a>
        </div>

        <h1 class="text-2xl font-black uppercase tracking-widest opacity-80 mb-12">Panel Wisbe</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-20 animate-fade">
            <!-- Citas -->
            <a href="beautyCitas.html" class="neu-card p-8 group">
                <i class="fas fa-calendar-check text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Citas</span>
            </a>

            <!-- Usuarios (Compartido) -->
            <a href="adminUsuarios.html" class="neu-card p-8 group">
                <i class="fas fa-users text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Clientes</span>
            </a>
        </div>

        <!-- Widget Section -->
        <section class="mt-20 text-left">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-xl font-black uppercase tracking-widest opacity-80">Widget Beauty</h2>
                <!-- Removed horizontal bar -->
            </div>

            <div class="neu-card p-10 md:p-14 text-left block">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                    <div>
                        <h4 class="text-xl font-bold mb-4 uppercase tracking-tight">Copia el código</h4>
                        <p class="text-sm mb-12 leading-relaxed opacity-70">Permite que tus clientes agenden citas desde tu web.</p>

                        <div class="space-y-10">
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-widest mb-4 block opacity-50">1. Script Global</label>
                                <div class="bg-black/10 rounded-2xl p-6 relative group border border-white/10">
                                    <code id="script-code" class="text-pink-500 font-mono text-xs block overflow-x-auto whitespace-nowrap">&lt;script src="https://wisbe.xyz/wisbeBeauty.js"&gt;&lt;/script&gt;</code>
                                    <button onclick="copyToClipboard('script-code')" class="absolute right-6 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-widest mb-4 block opacity-50">2. Etiqueta</label>
                                <div class="bg-black/10 rounded-2xl p-6 relative group border border-white/10">
                                    <code id="widget-code" class="text-emerald-500 font-mono text-xs block overflow-x-auto whitespace-nowrap">&lt;wisbe-beauty-citas domain="..."&gt;&lt;/wisbe-beauty-citas&gt;</code>
                                    <button onclick="copyToClipboard('widget-code')" class="absolute right-6 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-center justify-center text-center p-10 bg-white/5 rounded-[40px] border border-white/10">
                        <i class="fas fa-magic text-4xl mb-6 opacity-40"></i>
                        <h5 class="font-black text-lg mb-3 uppercase tracking-widest">Tu Dominio</h5>
                        <p id="user-domain" class="text-pink-500 font-mono font-black text-xl mb-6 uppercase tracking-tight">Cargando...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { supabase, renderNavbar, Auth, showToast, initTheme, renderAdminSidebar } from './assets/js/utils.js';

        let currentUser = null;
        let isAdmin = false;

        async function initPage() {
            renderNavbar();
            initTheme();
            currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner', 'beauty']);
            if (!currentUser) return;

            isAdmin = currentUser.role === 'gym-admin';

            if (isAdmin) {
                renderAdminSidebar(() => {
                    updateWidgetCode();
                });
            }

            updateWidgetCode();
        }

        async function updateWidgetCode() {
            const selectedOwnerId = Auth.getSelectedOwnerId();
            let domain = currentUser.domain;

            if (isAdmin && selectedOwnerId) {
                const { data } = await supabase.from('wisbe_users').select('domain').eq('id', selectedOwnerId).maybeSingle();
                domain = data?.domain;
            }

            const domainText = domain || 'SIN DOMINIO';
            document.getElementById('user-domain').innerText = domainText;

            if (domain) {
                document.getElementById('widget-code').innerText = `<wisbe-beauty-citas domain="${domain}"></wisbe-beauty-citas>`;
            } else {
                document.getElementById('widget-code').innerText = 'ERROR: CONFIGURA TU DOMINIO';
            }
        }

        window.copyToClipboard = (id) => {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('¡Copiado!');
            });
        };

        initPage();
    </script>
</body>
</html>
