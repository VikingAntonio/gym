<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Independientes - Wisbe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="container mx-auto px-4 pt-10 pb-6 border-b border-slate-200 bg-white shadow-sm mb-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-xl font-black">I</div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Independientes</h1>
                    <p class="text-slate-500 font-medium">Gestión de herramientas digitales</p>
                </div>
            </div>
            <div id="user-badge" class="flex items-center bg-slate-50 border border-slate-200 px-5 py-3 rounded-2xl">
                <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center text-slate-500 mr-4">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <span id="header-user-name" class="block text-sm font-bold text-slate-900 uppercase">Usuario</span>
                    <span id="user-role-label" class="block text-[10px] text-slate-400 font-black tracking-widest uppercase">Cargando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <!-- Quick Actions Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-20 animate-fade">
            <!-- Tarjeta Digital -->
            <a href="cards.html" class="card group hover:border-blue-500 transition-all duration-300">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <i class="fas fa-id-card"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2 uppercase">Tarjeta Digital</h3>
                <p class="text-slate-500 text-sm mb-6 leading-relaxed">Tu carta de presentación interactiva.</p>
                <div class="flex items-center text-blue-600 text-xs font-black uppercase tracking-widest">
                    Administrar <i class="fas fa-arrow-right ml-2 group-hover:translate-x-2 transition-transform"></i>
                </div>
            </a>
        </div>

        <!-- System Stats Bar -->
        <section class="mt-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="card flex items-center bg-white border-slate-200">
                    <div class="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center mr-5 text-xl">
                        <i class="fas fa-database"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Base de Datos</p>
                        <p class="text-sm font-bold text-slate-800">Supabase Cloud</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { renderNavbar, Auth } from './assets/js/utils.js';
        renderNavbar();
        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner', 'freelance']);

        if (currentUser) {
            document.getElementById('header-user-name').innerText = currentUser.full_name || currentUser.username;
            document.getElementById('user-role-label').innerText = currentUser.role.replace('gym-', '');
        }
    </script>
</body>
</html>
