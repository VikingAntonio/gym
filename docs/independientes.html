<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Independientes - Wisbe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen">
    <nav id="main-nav"></nav>

    <header class="container mx-auto px-4 pt-10 pb-6 mb-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 neu-card flex items-center justify-center text-xl font-black text-indigo-600">I</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight uppercase">Independientes</h1>
                    <p class="opacity-60 font-medium">Gestión de herramientas digitales</p>
                </div>
            </div>
            <div id="user-badge" class="flex items-center neu-card px-5 py-3">
                <div class="w-10 h-10 neu-card-inset rounded-full flex items-center justify-center opacity-60 mr-4">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <span id="header-user-name" class="block text-sm font-bold text-slate-900 uppercase">Usuario</span>
                    <span id="user-role-label" class="block text-[10px] text-slate-400 font-black tracking-widest uppercase">Cargando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <!-- Quick Actions Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-20 animate-fade">
            <!-- Tarjeta Digital -->
            <a href="cards.html" class="neu-card p-10 group hover:text-indigo-600 transition-all duration-300 flex flex-col items-center text-center">
                <div class="w-16 h-16 neu-card flex items-center justify-center text-xl mb-6 group-hover:neu-card-inset transition-all text-indigo-600">
                    <i class="fas fa-id-card"></i>
                </div>
                <h3 class="text-xl font-bold mb-2 uppercase">Tarjeta Digital</h3>
                <p class="opacity-60 text-sm mb-6 leading-relaxed">Tu carta de presentación interactiva.</p>
                <div class="flex items-center text-indigo-600 text-xs font-black uppercase tracking-widest">
                    Administrar <i class="fas fa-arrow-right ml-2 group-hover:translate-x-2 transition-transform"></i>
                </div>
            </a>
        </div>

    </main>

    <script type="module">
        import { renderNavbar, Auth, renderThemeToggle } from './assets/js/utils.js';
        renderNavbar();
        renderThemeToggle();
        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner', 'freelance']);

        if (currentUser) {
            document.getElementById('header-user-name').innerText = currentUser.full_name || currentUser.username;
            document.getElementById('user-role-label').innerText = currentUser.role.replace('gym-', '');
        }
    </script>
</body>
</html>
