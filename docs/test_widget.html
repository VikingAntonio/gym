<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Integración - Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-6 md:p-20">
    <div class="max-w-5xl mx-auto">
        <div class="mb-12">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Simulación de Integración</h1>
            <p class="text-slate-500 font-medium">Esta página demuestra cómo se vería el contenido embebido en un dominio externo.</p>
        </div>

        <div class="grid grid-cols-1 gap-12">
            <!-- Sección de Rutinas -->
            <section class="bg-white p-8 md:p-12 rounded-[40px] shadow-sm border border-slate-200">
                <div class="flex items-center mb-8">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mr-4">
                        <i class="fas fa-dumbbell"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">Módulo de Rutinas</h2>
                </div>

                <div class="border border-slate-100 rounded-3xl overflow-hidden">
                    <!-- Integración con Custom Element -->
                    <wisbe-widget type="rutinas" domain="lasalsitapinchi.com" height="700px"></wisbe-widget>
                </div>
            </section>

            <!-- Sección de Nutrición -->
            <section class="bg-white p-8 md:p-12 rounded-[40px] shadow-sm border border-slate-200">
                <div class="flex items-center mb-8">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mr-4">
                        <i class="fas fa-apple-whole"></i>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">Módulo de Nutrición</h2>
                </div>

                <div class="border border-slate-100 rounded-3xl overflow-hidden">
                    <!-- Integración con Div ID -->
                    <div id="wisbe-nutricion" domain="lasalsitapinchi.com" height="700px"></div>
                </div>
            </section>
        </div>

        <footer class="mt-20 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            Wisbe Integration Platform &copy; 2024
        </footer>
    </div>

    <!-- Cargar el script del widget -->
    <script src="widget.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
