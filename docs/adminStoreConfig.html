<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Tienda - Wisbe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="wisbeStore.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <nav id="main-nav"></nav>

    <main class="container mx-auto px-4 py-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Configuración</h1>
                <p class="text-slate-500 font-medium mt-1">Personaliza la apariencia y el funcionamiento de tu tienda.</p>
            </div>
            <a href="store.html" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-xl uppercase tracking-widest text-xs font-black transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Volver al Panel
            </a>
        </header>

        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-[40px] p-10 shadow-sm border border-slate-200">
                <form id="config-form" class="space-y-10">
                    <section>
                        <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest mb-6">Información General</h3>
                        <div class="space-y-6">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Nombre Público de la Tienda</label>
                                <input type="text" id="store_name" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 font-bold" placeholder="Ej: Mi Tienda Fitness">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Mensaje de Bienvenida</label>
                                <textarea id="welcome_message" rows="3" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 font-medium resize-none" placeholder="Bienvenido a nuestra tienda oficial..."></textarea>
                            </div>
                        </div>
                    </section>

                    <section>
                        <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest mb-6">Contacto y Ventas</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">WhatsApp para Pedidos</label>
                                <input type="text" id="whatsapp" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 font-bold" placeholder="+52 ...">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Moneda</label>
                                <select id="currency" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500 font-bold">
                                    <option value="USD">Dólar (USD)</option>
                                    <option value="MXN">Peso Mexicano (MXN)</option>
                                    <option value="EUR">Euro (EUR)</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <div class="pt-6">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-blue-600/30 transition-all">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, renderNavbar, Auth, showPopup, renderAdminSidebar } from './assets/js/utils.js';

        let currentUser = null;
        let isAdmin = false;

        async function initPage() {
            renderNavbar();
            currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner', 'tienda']);
            if (!currentUser) return;

            isAdmin = currentUser.role === 'gym-admin';

            if (isAdmin) {
                renderAdminSidebar(() => {
                    loadConfig();
                });
            }

            await loadConfig();
        }

        async function loadConfig() {
            // This would normally fetch from a 'wisbe_store_settings' table
            // For now, we'll just show it works
            console.log('Loading store config...');
        }

        document.getElementById('config-form').onsubmit = (e) => {
            e.preventDefault();
            showPopup('Éxito', 'Configuración guardada correctamente.');
        };

        initPage();
    </script>
</body>
</html>
