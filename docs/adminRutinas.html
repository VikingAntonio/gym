<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Rutinas - Core Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col xl:flex-row">
        <!-- Sidebar: Advanced Config -->
        <aside class="w-full xl:w-[450px] bg-white border-r border-slate-200 min-h-screen p-8 xl:sticky xl:top-16 xl:h-[calc(100vh-64px)] overflow-y-auto">
            <div class="mb-10">
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Editor de Rutinas</h2>
                <p class="text-slate-500 text-sm">Diseña planes de entrenamiento estructurados.</p>
            </div>

            <form id="routine-form" class="space-y-8">
                <!-- Portada con Drag and Drop -->
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Imagen de portada</label>
                    <div id="drop-zone" class="w-full h-40 border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center text-slate-400 hover:border-blue-500 hover:bg-blue-50/30 transition-all cursor-pointer overflow-hidden group bg-slate-50 relative">
                        <div id="drop-placeholder" class="text-center p-6">
                            <i class="fas fa-cloud-upload-alt text-3xl mb-3 group-hover:scale-110 transition-transform"></i>
                            <p class="text-[10px] font-bold uppercase tracking-tighter">Sube una imagen</p>
                        </div>
                        <img id="preview-image" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Título del Plan</label>
                        <input type="text" id="title" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="Ej: Transformación Total">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Dificultad</label>
                            <select id="difficulty" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option>Novato</option>
                                <option>Guerrero</option>
                                <option>Élite</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Duración</label>
                            <select id="duration" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option value="1">1 Semana</option>
                                <option value="4" selected>4 Semanas</option>
                                <option value="12">12 Semanas</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Género</label>
                            <select id="gender" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option>Unisex</option>
                                <option>Masculino</option>
                                <option>Femenino</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Edad</label>
                            <select id="age" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                                <option>Cualquiera</option>
                                <option>Joven</option>
                                <option>Adulto</option>
                                <option>Senior</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Resumen</label>
                        <textarea id="description" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium resize-none" placeholder="Breve descripción del plan..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-bold uppercase tracking-widest text-xs shadow-xl shadow-slate-200 hover:bg-blue-600 transition-all active:scale-95">
                    <span id="btn-text">Publicar Plan Maestro</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-spinner animate-spin mr-2"></i> Guardando...</span>
                </button>
            </form>

            <div id="routines-list" class="mt-12 space-y-3">
                <!-- Listado para borrar -->
            </div>
        </aside>

        <!-- Main Workspace: Weekly Builder -->
        <main class="flex-grow p-8 xl:p-12">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900">Programación Semanal</h2>
                        <p class="text-slate-500 mt-1">Define las fases y ejercicios del entrenamiento.</p>
                    </div>
                    <button type="button" id="add-week" class="px-8 py-4 bg-white text-blue-600 rounded-2xl font-bold border border-blue-100 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                        <i class="fas fa-plus mr-2"></i> Nueva Semana
                    </button>
                </div>

                <div id="weeks-container" class="space-y-10 pb-20">
                    <!-- Semanas dinámicas -->
                </div>
            </div>
        </main>
    </div>

    <!-- Templates -->
    <template id="week-template">
        <div class="week-block bg-white rounded-[40px] shadow-sm border border-slate-200 p-10 relative animate-fade-in">
            <div class="flex justify-between items-center mb-10 border-b border-slate-100 pb-6">
                <div class="flex items-center space-x-5">
                    <div class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-bold text-lg">W</div>
                    <input type="text" value="Semana 1" class="text-2xl font-bold text-slate-900 bg-transparent border-none focus:ring-0 w-64">
                </div>
                <button type="button" class="remove-week text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
            </div>

            <div class="days-grid grid grid-cols-1 md:grid-cols-2 gap-8"></div>

            <button type="button" class="add-day w-full py-5 mt-10 border-2 border-dashed border-slate-100 rounded-3xl text-slate-400 font-bold hover:border-blue-200 hover:text-blue-500 transition-all flex items-center justify-center bg-slate-50/50">
                <i class="fas fa-calendar-plus mr-2"></i> Agregar Día
            </button>
        </div>
    </template>

    <template id="day-template">
        <div class="day-card bg-slate-50 rounded-[32px] p-8 border border-slate-100 relative group transition-all hover:bg-white hover:shadow-md">
            <button type="button" class="remove-day absolute top-6 right-6 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-times"></i></button>
            <div class="mb-6">
                <input type="text" value="Lunes" class="font-bold text-slate-900 bg-transparent border-none focus:ring-0 uppercase tracking-widest text-[10px]">
            </div>
            <div class="moves-list space-y-4 mb-8"></div>
            <button type="button" class="add-move w-full py-3 bg-white text-[10px] font-bold uppercase text-slate-400 rounded-2xl border border-slate-100 hover:text-blue-500 hover:border-blue-200 transition-all shadow-sm">
                + Ejercicio
            </button>
        </div>
    </template>

    <template id="move-template">
        <div class="move-item bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm space-y-4 relative animate-fade-in">
            <input type="text" placeholder="Ejercicio" class="w-full text-sm font-bold text-slate-800 bg-transparent border-none focus:ring-0 p-0">
            <div class="flex items-center space-x-3">
                <div class="flex-grow grid grid-cols-3 gap-2">
                    <input type="text" placeholder="S" class="bg-slate-50 rounded-xl text-[10px] p-3 border-none text-center font-bold" title="Series">
                    <input type="text" placeholder="R" class="bg-slate-50 rounded-xl text-[10px] p-3 border-none text-center font-bold" title="Reps">
                    <input type="text" placeholder="⏳" class="bg-slate-50 rounded-xl text-[10px] p-3 border-none text-center font-bold" title="Descanso">
                </div>
                <button type="button" class="remove-move text-slate-200 hover:text-red-400 transition-colors"><i class="fas fa-minus-circle"></i></button>
            </div>
        </div>
    </template>

    <script type="module">
        import { supabase, uploadToCloudinary, setupDragAndDrop, renderNavbar, Auth, showPopup, showConfirm } from './js/utils.js';
        renderNavbar();
        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner']);
        if (currentUser) {
            initPage();
        }

        function initPage() {
        const weeksContainer = document.getElementById('weeks-container');
        const addWeekBtn = document.getElementById('add-week');
        const routineForm = document.getElementById('routine-form');
        const routinesList = document.getElementById('routines-list');

        // Setup Drag & Drop
        const dropZone = document.getElementById('drop-zone');
        const imageInput = document.getElementById('image-input');
        const previewImage = document.getElementById('preview-image');
        const dropPlaceholder = document.getElementById('drop-placeholder');

        setupDragAndDrop(dropZone, imageInput, (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                dropPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Builder Logic
        function createWeek() {
            const template = document.getElementById('week-template').content.cloneNode(true);
            const weekBlock = template.querySelector('.week-block');
            const daysGrid = weekBlock.querySelector('.days-grid');

            weekBlock.querySelector('.remove-week').addEventListener('click', () => weekBlock.remove());
            weekBlock.querySelector('.add-day').addEventListener('click', () => {
                const dayTemplate = document.getElementById('day-template').content.cloneNode(true);
                const dayCard = dayTemplate.querySelector('.day-card');
                const movesList = dayCard.querySelector('.moves-list');

                dayCard.querySelector('.remove-day').addEventListener('click', () => dayCard.remove());
                dayCard.querySelector('.add-move').addEventListener('click', () => {
                    const moveTemplate = document.getElementById('move-template').content.cloneNode(true);
                    const moveItem = moveTemplate.querySelector('.move-item');
                    moveItem.querySelector('.remove-move').addEventListener('click', () => moveItem.remove());
                    movesList.appendChild(moveItem);
                });

                daysGrid.appendChild(dayCard);
            });

            weeksContainer.appendChild(weekBlock);
        }

        addWeekBtn.addEventListener('click', createWeek);
        createWeek(); // Initial Week

        routineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const weeksData = [];
                document.querySelectorAll('.week-block').forEach(weekBlock => {
                    const weekTitle = weekBlock.querySelector('input').value;
                    const days = [];
                    weekBlock.querySelectorAll('.day-card').forEach(dayCard => {
                        const dayName = dayCard.querySelector('input').value;
                        const moves = [];
                        dayCard.querySelectorAll('.move-item').forEach(item => {
                            const inputs = item.querySelectorAll('input');
                            moves.push({
                                name: inputs[0].value,
                                sets: inputs[1].value,
                                reps: inputs[2].value,
                                rest: inputs[3].value
                            });
                        });
                        days.push({ day: dayName, moves });
                    });
                    weeksData.push({ week: weekTitle, days });
                });

                const title = document.getElementById('title').value;
                const difficulty_level = document.getElementById('difficulty').value;
                const plan_duration_weeks = document.getElementById('duration').value;
                const target_gender = document.getElementById('gender').value;
                const target_age_group = document.getElementById('age').value;
                const description = document.getElementById('description').value;
                const imageFile = imageInput.files[0];

                let imageUrl = '';
                if (imageFile) imageUrl = await uploadToCloudinary(imageFile);

                // SYNC
                await supabase.rpc('create_profile_if_missing', {
                    p_id: currentUser.id,
                    p_email: currentUser.email,
                    p_full_name: currentUser.full_name || '',
                    p_domain: currentUser.domain || null,
                    p_role: currentUser.role || 'gym-owner',
                    p_owner_id: currentUser.owner_id || null
                });

                const { error } = await supabase.from('gym_routines').insert([{
                    title, description, image_url: imageUrl,
                    exercises: weeksData,
                    difficulty_level, plan_duration_weeks,
                    target_gender, target_age_group,
                    level: difficulty_level,
                    owner_id: currentUser.id
                }]);

                if (error) throw error;
                await showPopup('Éxito', 'Plan de entrenamiento publicado');
                location.reload();

            } catch (err) {
                await showPopup('Error', err.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        async function fetchRoutines() {
            let query = supabase.from('gym_routines').select('id, title').order('created_at', { ascending: false });
            if (currentUser.role === 'gym-owner') {
                query = query.eq('owner_id', currentUser.id);
            }

            const { data, error } = await query;
            if (error) return;

            routinesList.innerHTML = '<h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-4">Planes Activos</h3>' +
                data.map(r => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center group border border-slate-100 hover:border-slate-200 transition-all shadow-sm">
                    <span class="text-sm font-bold text-slate-700">${r.title}</span>
                    <button onclick="deleteRoutine(${r.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        window.deleteRoutine = async (id) => {
            if (await showConfirm('¿Borrar plan?', 'Esta acción eliminará toda la programación de este plan.')) {
                await supabase.from('gym_routines').delete().eq('id', id);
                fetchRoutines();
            }
        }

        fetchRoutines();
        }
    </script>
</body>
</html>
