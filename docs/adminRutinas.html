<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseñador Ultra Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col xl:flex-row">
        <!-- Sidebar: Advanced Config -->
        <aside class="w-full xl:w-[400px] bg-white border-r min-h-screen p-8 xl:sticky xl:top-16 xl:h-[calc(100vh-64px)] overflow-y-auto">
            <div class="mb-10">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight mb-2">Editor Ultra Pro</h2>
                <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">Planificación de Élite</p>
            </div>

            <form id="routine-form" class="space-y-8">
                <!-- Portada con Drag and Drop -->
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase">Imagen de Portada (Drag & Drop)</label>
                    <div id="drop-zone" class="w-full h-32 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-400 hover:border-blue-400 hover:text-blue-500 transition-all cursor-pointer overflow-hidden group">
                        <div id="drop-placeholder" class="text-center p-4">
                            <i class="fas fa-cloud-upload-alt text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                            <p class="text-[10px] font-bold uppercase tracking-tighter">Arrastra o haz click aquí</p>
                        </div>
                        <img id="preview-image" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Título del Plan</label>
                        <input type="text" id="title" required class="input-field" placeholder="Ej: Transformación 90 Días">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Dificultad</label>
                            <select id="difficulty" class="input-field">
                                <option>Novato</option>
                                <option>Guerrero</option>
                                <option>Élite</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Duración</label>
                            <select id="duration" class="input-field">
                                <option value="1">1 Semanas</option>
                                <option value="4" selected>4 Semanas</option>
                                <option value="12">12 Semanas</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Género</label>
                            <select id="gender" class="input-field">
                                <option>Unisex</option>
                                <option>Masculino</option>
                                <option>Femenino</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Edad</label>
                            <select id="age" class="input-field">
                                <option>Cualquiera</option>
                                <option>Niño</option>
                                <option>Joven</option>
                                <option>Adulto</option>
                                <option>Senior</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Condiciones de Salud</label>
                        <select id="health" class="input-field">
                            <option>Ninguna</option>
                            <option>Problemas Cardíacos</option>
                            <option>Lesiones Óseas</option>
                            <option>Asma / Respiratorio</option>
                            <option>Diabetes</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Breve Resumen</label>
                        <textarea id="description" rows="3" class="input-field" placeholder="Explica los objetivos..."></textarea>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black uppercase tracking-widest text-sm shadow-2xl hover:bg-blue-600 hover:-translate-y-1 active:scale-95 transition-all">
                    <span id="btn-text">Publicar Plan Ultra</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-spinner animate-spin mr-2"></i> Procesando...</span>
                </button>
            </form>
        </aside>

        <!-- Main Workspace: Weekly Builder -->
        <main class="flex-grow p-8 xl:p-12">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h2 class="text-4xl font-black text-slate-900">Programación por Fases</h2>
                        <p class="text-slate-500 mt-2 font-medium">Define las semanas y días del entrenamiento.</p>
                    </div>
                    <button type="button" id="add-week" class="px-8 py-3 bg-blue-100 text-blue-600 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition-all">
                        <i class="fas fa-layer-group mr-2"></i> Nueva Fase / Semana
                    </button>
                </div>

                <div id="weeks-container" class="space-y-12 pb-20">
                    <!-- Semanas dinámicas -->
                </div>
            </div>
        </main>
    </div>

    <!-- Templates -->
    <template id="week-template">
        <div class="week-block bg-white rounded-[40px] shadow-xl border border-white p-8 relative animate-fade-in">
            <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-6">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-lg">W</div>
                    <input type="text" value="Semana 1" class="text-2xl font-black text-slate-800 bg-transparent border-none focus:ring-0 w-64">
                </div>
                <button type="button" class="remove-week text-slate-300 hover:text-red-500 text-xl transition-colors"><i class="fas fa-trash-alt"></i></button>
            </div>

            <div class="days-grid grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Días dinámicos -->
            </div>

            <button type="button" class="add-day w-full py-4 mt-8 border-2 border-dashed border-slate-100 rounded-3xl text-slate-400 font-bold hover:border-blue-200 hover:text-blue-500 transition-all flex items-center justify-center">
                <i class="fas fa-calendar-plus mr-2"></i> Agregar Día de Entrenamiento
            </button>
        </div>
    </template>

    <template id="day-template">
        <div class="day-card bg-slate-50 rounded-3xl p-6 border border-slate-100 relative group transition-all hover:bg-white hover:shadow-lg">
            <button type="button" class="remove-day absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-times"></i></button>
            <div class="mb-4">
                <input type="text" value="Lunes" class="font-black text-slate-800 bg-transparent border-none focus:ring-0 uppercase tracking-widest text-xs">
            </div>
            <div class="moves-list space-y-3 mb-6"></div>
            <button type="button" class="add-move w-full py-2 bg-white text-[10px] font-black uppercase text-slate-400 rounded-xl border border-slate-100 hover:text-blue-500 hover:border-blue-200 transition-all">
                + Ejercicio
            </button>
        </div>
    </template>

    <template id="move-template">
        <div class="move-item bg-white p-3 rounded-2xl border border-slate-100 shadow-sm space-y-2 relative animate-fade-in">
            <input type="text" placeholder="Ejercicio (ej: Press de Banca)" class="w-full text-xs font-bold text-slate-700 bg-transparent border-none focus:ring-0 p-0">
            <div class="flex items-center space-x-2">
                <div class="flex-grow grid grid-cols-3 gap-1">
                    <input type="text" placeholder="S" class="bg-slate-50 rounded-lg text-[10px] p-2 border-none text-center font-bold" title="Series">
                    <input type="text" placeholder="R" class="bg-slate-50 rounded-lg text-[10px] p-2 border-none text-center font-bold" title="Reps">
                    <input type="text" placeholder="⏳" class="bg-slate-50 rounded-lg text-[10px] p-2 border-none text-center font-bold" title="Descanso">
                </div>
                <button type="button" class="remove-move text-slate-200 hover:text-red-400 transition-colors"><i class="fas fa-minus-circle"></i></button>
            </div>
        </div>
    </template>

    <script type="module">
        import { supabase, uploadToCloudinary, setupDragAndDrop, renderNavbar, Auth, showPopup } from './js/utils.js';
        renderNavbar();
        await Auth.checkAccess(['gym-admin', 'gym-owner']);

        const weeksContainer = document.getElementById('weeks-container');
        const addWeekBtn = document.getElementById('add-week');
        const routineForm = document.getElementById('routine-form');

        // Setup Drag & Drop
        const dropZone = document.getElementById('drop-zone');
        const imageInput = document.getElementById('image-input');
        const previewImage = document.getElementById('preview-image');
        const dropPlaceholder = document.getElementById('drop-placeholder');

        setupDragAndDrop(dropZone, imageInput, (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                dropPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Builder Logic
        function createWeek() {
            const template = document.getElementById('week-template').content.cloneNode(true);
            const weekBlock = template.querySelector('.week-block');
            const daysGrid = weekBlock.querySelector('.days-grid');

            weekBlock.querySelector('.remove-week').addEventListener('click', () => weekBlock.remove());
            weekBlock.querySelector('.add-day').addEventListener('click', () => {
                const dayTemplate = document.getElementById('day-template').content.cloneNode(true);
                const dayCard = dayTemplate.querySelector('.day-card');
                const movesList = dayCard.querySelector('.moves-list');

                dayCard.querySelector('.remove-day').addEventListener('click', () => dayCard.remove());
                dayCard.querySelector('.add-move').addEventListener('click', () => {
                    const moveTemplate = document.getElementById('move-template').content.cloneNode(true);
                    const moveItem = moveTemplate.querySelector('.move-item');
                    moveItem.querySelector('.remove-move').addEventListener('click', () => moveItem.remove());
                    movesList.appendChild(moveItem);
                });

                daysGrid.appendChild(dayCard);
            });

            weeksContainer.appendChild(weekBlock);
        }

        addWeekBtn.addEventListener('click', createWeek);
        createWeek(); // Initial Week

        // Save Logic
        routineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                // Collect Multi-Week Structure
                const weeksData = [];
                document.querySelectorAll('.week-block').forEach(weekBlock => {
                    const weekTitle = weekBlock.querySelector('input').value;
                    const days = [];
                    weekBlock.querySelectorAll('.day-card').forEach(dayCard => {
                        const dayName = dayCard.querySelector('input').value;
                        const moves = [];
                        dayCard.querySelectorAll('.move-item').forEach(item => {
                            const inputs = item.querySelectorAll('input');
                            moves.push({
                                name: inputs[0].value,
                                sets: inputs[1].value,
                                reps: inputs[2].value,
                                rest: inputs[3].value
                            });
                        });
                        days.push({ day: dayName, moves });
                    });
                    weeksData.push({ week: weekTitle, days });
                });

                const title = document.getElementById('title').value;
                const difficulty_level = document.getElementById('difficulty').value;
                const plan_duration_weeks = document.getElementById('duration').value;
                const target_gender = document.getElementById('gender').value;
                const target_age_group = document.getElementById('age').value;
                const health_conditions = document.getElementById('health').value;
                const description = document.getElementById('description').value;
                const imageFile = imageInput.files[0];

                let imageUrl = '';
                if (imageFile) {
                    imageUrl = await uploadToCloudinary(imageFile);
                }

                const { error } = await supabase.from('gym_routines').insert([{
                    title, description, image_url: imageUrl,
                    exercises: weeksData,
                    difficulty_level, plan_duration_weeks,
                    target_gender, target_age_group, health_conditions,
                    level: difficulty_level // Backward compatibility
                }]);

                if (error) throw error;
                await showPopup('¡Éxito!', '¡Sistema Ultra Pro Actualizado!');
                window.location.href = 'admin.html';

            } catch (err) {
                await showPopup('Error Crítico', err.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
