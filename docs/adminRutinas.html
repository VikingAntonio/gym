<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Rutinas Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <div class="flex flex-col lg:flex-row">
        <!-- Sidebar / Form -->
        <aside class="w-full lg:w-1/3 bg-white border-r min-h-screen p-6 lg:sticky lg:top-16 lg:h-[calc(100vh-64px)] overflow-y-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                <i class="fas fa-plus-circle text-orange-500 mr-2"></i> Nueva Rutina
            </h2>

            <form id="routine-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Título de la Rutina</label>
                    <input type="text" id="title" required class="input-field" placeholder="Ej: Hipertrofia Nivel 1">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nivel</label>
                        <select id="level" class="input-field">
                            <option>Principiante</option>
                            <option>Intermedio</option>
                            <option>Avanzado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Meta</label>
                        <select id="goal" class="input-field">
                            <option>Ganar músculo</option>
                            <option>Perder peso</option>
                            <option>Resistencia</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Imagen Portada</label>
                    <input type="file" id="image" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-orange-50 file:text-orange-700">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Descripción</label>
                    <textarea id="description" rows="2" class="input-field" placeholder="Objetivos de la rutina..."></textarea>
                </div>

                <div class="border-t pt-6">
                    <h3 class="font-bold text-slate-800 mb-4 flex justify-between items-center">
                        Plan Semanal
                        <button type="button" id="add-day" class="text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded-full hover:bg-orange-200 transition">
                            <i class="fas fa-calendar-plus mr-1"></i> Añadir Día
                        </button>
                    </h3>

                    <div id="days-container" class="space-y-4 text-sm">
                        <!-- Aquí se inyectan los días -->
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary w-full bg-orange-600 hover:bg-orange-700 mt-8 py-3">
                    <span id="btn-text">Publicar Rutina Pro</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-circle-notch animate-spin mr-2"></i> Guardando...</span>
                </button>
            </form>
        </aside>

        <!-- Main View / List -->
        <main class="w-full lg:w-2/3 p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Rutinas Existentes</h2>
                <div id="stats" class="text-sm font-medium text-slate-500 bg-white px-4 py-2 rounded-lg shadow-sm border"></div>
            </div>

            <div id="routines-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Rutinas cargadas dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Template para Ejercicio -->
    <template id="exercise-template">
        <div class="exercise-item bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-2 mb-2 relative group">
            <button type="button" class="remove-exercise absolute top-1 right-1 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-times-circle"></i>
            </button>
            <input type="text" placeholder="Nombre Ejercicio" class="w-full bg-transparent border-b border-slate-300 focus:border-orange-500 outline-none p-1 font-medium">
            <div class="flex space-x-2">
                <input type="text" placeholder="Sets" class="w-1/3 bg-white border rounded px-2 py-1 text-xs" title="Sets">
                <input type="text" placeholder="Reps" class="w-1/3 bg-white border rounded px-2 py-1 text-xs" title="Reps">
                <input type="text" placeholder="Desc" class="w-1/3 bg-white border rounded px-2 py-1 text-xs" title="Descanso">
            </div>
        </div>
    </template>

    <script type="module">
        import { supabase, uploadToCloudinary, renderNavbar } from './js/utils.js';
        renderNavbar();

        const daysContainer = document.getElementById('days-container');
        const addDayBtn = document.getElementById('add-day');
        const routineForm = document.getElementById('routine-form');
        const routinesList = document.getElementById('routines-list');

        let daysCount = 0;

        // Función para añadir un día al constructor
        function createDayElement() {
            daysCount++;
            const dayDiv = document.createElement('div');
            dayDiv.className = "day-block bg-white border-2 border-slate-100 rounded-xl p-4 shadow-sm";
            dayDiv.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <input type="text" value="Día ${daysCount}" class="font-bold text-slate-700 bg-transparent border-none focus:ring-0 w-24">
                    <button type="button" class="remove-day text-slate-400 hover:text-red-500"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>
                <div class="exercises-list"></div>
                <button type="button" class="add-exercise w-full py-2 border-2 border-dashed border-slate-200 rounded-lg text-xs text-slate-400 hover:border-orange-300 hover:text-orange-500 transition mt-2">
                    <i class="fas fa-plus mr-1"></i> Añadir Ejercicio
                </button>
            `;

            // Eventos internos del día
            dayDiv.querySelector('.remove-day').addEventListener('click', () => dayDiv.remove());
            dayDiv.querySelector('.add-exercise').addEventListener('click', () => {
                const template = document.getElementById('exercise-template').content.cloneNode(true);
                const exerciseItem = template.querySelector('.exercise-item');
                exerciseItem.querySelector('.remove-exercise').addEventListener('click', () => exerciseItem.remove());
                dayDiv.querySelector('.exercises-list').appendChild(template);
            });

            daysContainer.appendChild(dayDiv);
        }

        addDayBtn.addEventListener('click', createDayElement);

        // Al iniciar, añadir un día por defecto
        createDayElement();

        // Guardar rutina
        routineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoading = document.getElementById('btn-loading');

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                // Recolectar datos de los días y ejercicios
                const exercisesData = [];
                document.querySelectorAll('.day-block').forEach(dayBlock => {
                    const dayName = dayBlock.querySelector('input').value;
                    const moves = [];
                    dayBlock.querySelectorAll('.exercise-item').forEach(item => {
                        const inputs = item.querySelectorAll('input');
                        moves.push({
                            name: inputs[0].value,
                            sets: inputs[1].value,
                            reps: inputs[2].value,
                            rest: inputs[3].value
                        });
                    });
                    if (moves.length > 0) {
                        exercisesData.push({ day: dayName, moves });
                    }
                });

                const title = document.getElementById('title').value;
                const level = document.getElementById('level').value;
                const goal = document.getElementById('goal').value;
                const description = document.getElementById('description').value;
                const imageFile = document.getElementById('image').files[0];

                let imageUrl = '';
                if (imageFile) {
                    imageUrl = await uploadToCloudinary(imageFile);
                }

                const { error } = await supabase.from('gym_routines').insert([{
                    title, level, goal, description, image_url: imageUrl, exercises: exercisesData
                }]);

                if (error) throw error;

                alert('¡Rutina publicada con éxito!');
                location.reload();

            } catch (err) {
                alert('Error al guardar: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });

        // Cargar rutinas existentes
        async function fetchRoutines() {
            const { data, error } = await supabase
                .from('gym_routines')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return;

            document.getElementById('stats').textContent = `${data.length} Rutinas creadas`;

            routinesList.innerHTML = data.map(r => `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition">
                    <img src="${r.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=400'}"
                         class="w-full h-40 object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-lg text-slate-800">${r.title}</h4>
                            <span class="text-[10px] font-bold uppercase px-2 py-1 bg-slate-100 rounded text-slate-500">${r.level}</span>
                        </div>
                        <p class="text-sm text-slate-500 mb-4 line-clamp-2">${r.description || 'Sin descripción.'}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                            <span class="text-xs text-slate-400"><i class="far fa-calendar-alt mr-1"></i> ${new Date(r.created_at).toLocaleDateString()}</span>
                            <button onclick="deleteRoutine(${r.id})" class="text-red-400 hover:text-red-600 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.deleteRoutine = async (id) => {
            if (!confirm('¿Seguro que quieres eliminar esta rutina?')) return;
            const { error } = await supabase.from('gym_routines').delete().eq('id', id);
            if (error) alert('Error al borrar');
            else fetchRoutines();
        }

        fetchRoutines();
    </script>
</body>
</html>
