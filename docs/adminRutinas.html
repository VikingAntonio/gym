<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rutinas - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <nav id="main-nav"></nav>

    <header class="bg-slate-800 py-10 text-white text-center">
        <h1 class="text-3xl font-bold">Administrar Rutinas</h1>
        <p class="mt-2 text-slate-400">Agrega rutinas y ejercicios para tus usuarios.</p>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-2xl">
        <form id="routine-form" class="bg-white p-8 rounded-xl shadow-lg space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Título de la Rutina</label>
                <input type="text" id="title" required class="input-field" placeholder="Ej: Full Body para Principiantes">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nivel</label>
                    <select id="level" class="input-field">
                        <option value="Principiante">Principiante</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Objetivo</label>
                    <select id="goal" class="input-field">
                        <option value="Perder peso">Perder peso</option>
                        <option value="Ganar músculo">Ganar músculo</option>
                        <option value="Tonificar">Tonificar</option>
                        <option value="Resistencia">Resistencia</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Imagen Representativa</label>
                <input type="file" id="image" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Descripción Corta</label>
                <textarea id="description" rows="2" class="input-field" placeholder="Breve descripción de la rutina..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Lista de Ejercicios (Uno por línea)</label>
                <textarea id="exercises" rows="5" required class="input-field" placeholder="1. Sentadillas: 3x12&#10;2. Flexiones: 3x10..."></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full bg-orange-600 hover:bg-orange-700">
                <span id="btn-text">Guardar Rutina</span>
                <span id="btn-loading" class="hidden">Guardando...</span>
            </button>
            <div id="message" class="text-center mt-4 hidden"></div>
        </form>
    </main>

    <script type="module">
        import { supabase, uploadToCloudinary, renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('routine-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            messageDiv.className = "text-center mt-4 hidden";

            try {
                const title = document.getElementById('title').value;
                const level = document.getElementById('level').value;
                const goal = document.getElementById('goal').value;
                const description = document.getElementById('description').value;
                const exercises = document.getElementById('exercises').value;
                const imageFile = document.getElementById('image').files[0];

                let imageUrl = '';
                if (imageFile) {
                    imageUrl = await uploadToCloudinary(imageFile);
                }

                const { data, error } = await supabase
                    .from('gym_routines')
                    .insert([{
                        title,
                        level,
                        goal,
                        description,
                        exercises,
                        image_url: imageUrl
                    }]);

                if (error) throw error;

                messageDiv.textContent = "¡Rutina guardada con éxito!";
                messageDiv.className = "text-center mt-4 text-green-600 font-bold";
                messageDiv.classList.remove('hidden');
                form.reset();

            } catch (error) {
                console.error(error);
                messageDiv.textContent = "Error: " + error.message;
                messageDiv.className = "text-center mt-4 text-red-600 font-bold";
                messageDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
