<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrición y Recetas - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-emerald-600 py-24 text-white text-center relative overflow-hidden">
        <div class="container mx-auto px-4 z-10 relative">
            <h1 class="text-6xl font-black mb-6 tracking-tight">Cocina Saludable</h1>
            <p class="text-emerald-100 text-2xl max-w-3xl mx-auto font-light leading-relaxed">
                Aprende a nutrir tu cuerpo con nuestras recetas exclusivas, diseñadas para potenciar tu rendimiento.
            </p>
        </div>
        <!-- Decorative Circle -->
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-emerald-500 rounded-full opacity-30"></div>
    </header>

    <main class="container mx-auto px-4 py-20">
        <!-- Categories -->
        <div class="flex flex-wrap justify-center gap-4 mb-16">
            <button class="bg-white px-8 py-3 rounded-2xl shadow-sm border border-slate-100 font-bold text-slate-600 hover:bg-emerald-600 hover:text-white transition-all duration-300">Todo</button>
            <button class="bg-white px-8 py-3 rounded-2xl shadow-sm border border-slate-100 font-bold text-slate-600 hover:bg-emerald-600 hover:text-white transition-all duration-300">Desayuno</button>
            <button class="bg-white px-8 py-3 rounded-2xl shadow-sm border border-slate-100 font-bold text-slate-600 hover:bg-emerald-600 hover:text-white transition-all duration-300">Almuerzo</button>
            <button class="bg-white px-8 py-3 rounded-2xl shadow-sm border border-slate-100 font-bold text-slate-600 hover:bg-emerald-600 hover:text-white transition-all duration-300">Cena</button>
        </div>

        <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- Modal para Ver Receta Completa -->
    <div id="recipe-modal" class="fixed inset-0 bg-slate-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden shadow-2xl flex flex-col md:flex-row border border-white/20">
            <div class="md:w-5/12 h-64 md:h-auto bg-slate-100 relative">
                <img id="modal-image" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-8">
                    <span id="modal-category" class="text-xs font-bold bg-emerald-500 text-white px-4 py-2 rounded-full uppercase tracking-widest shadow-lg"></span>
                </div>
            </div>
            <div class="md:w-7/12 p-8 md:p-12 overflow-y-auto bg-white">
                <div class="flex justify-between items-start mb-8">
                    <h2 id="modal-title" class="text-4xl font-black text-slate-800 leading-tight"></h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-emerald-500 transition-all text-2xl"><i class="fas fa-times"></i></button>
                </div>

                <!-- Nutri Info -->
                <div class="grid grid-cols-4 gap-4 mb-10">
                    <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                        <span id="modal-calories" class="block text-2xl font-black text-emerald-600"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kcal</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                        <span id="modal-protein" class="block text-2xl font-black text-slate-800"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Prote</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                        <span id="modal-carbs" class="block text-2xl font-black text-slate-800"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Carbs</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                        <span id="modal-fats" class="block text-2xl font-black text-slate-800"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Grasas</span>
                    </div>
                </div>

                <div class="space-y-10">
                    <div>
                        <h4 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                            <i class="fas fa-list-check mr-3 text-emerald-500"></i> Ingredientes
                        </h4>
                        <div id="modal-ingredients" class="text-slate-600 leading-relaxed whitespace-pre-wrap pl-8"></div>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                            <i class="fas fa-kitchen-set mr-3 text-emerald-500"></i> Preparación
                        </h4>
                        <div id="modal-instructions" class="text-slate-600 leading-relaxed whitespace-pre-wrap pl-8 bg-slate-50 p-6 rounded-3xl border border-dashed border-slate-200"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        const grid = document.getElementById('recipes-grid');
        const modal = document.getElementById('recipe-modal');

        async function loadRecipes() {
            const { data, error } = await supabase.from('gym_recipes').select('*').order('created_at', { ascending: false });
            if (error) return;

            grid.innerHTML = data.map(r => `
                <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden hover:shadow-2xl transition-all duration-500 group">
                    <div class="h-64 relative overflow-hidden">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=600'}"
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <div class="absolute top-4 left-4">
                            <span class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest text-emerald-600 shadow-xl">${r.category}</span>
                        </div>
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black text-slate-800 mb-4 line-clamp-1">${r.title}</h3>
                        <div class="flex justify-between items-center mb-8 border-t border-b border-slate-50 py-4">
                            <div class="text-center">
                                <span class="block text-xl font-black text-emerald-600">${r.calories || 0}</span>
                                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Calorías</span>
                            </div>
                            <div class="text-center">
                                <span class="block text-xl font-black text-slate-800">${r.protein || 0}g</span>
                                <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Proteína</span>
                            </div>
                        </div>
                        <button onclick='openModal(${JSON.stringify(r).replace(/'/g, "&apos;")})'
                                class="w-full py-4 bg-slate-900 hover:bg-emerald-600 text-white font-bold rounded-2xl transition-all shadow-xl hover:shadow-emerald-200 uppercase tracking-widest text-xs">
                            Ver Receta
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = (r) => {
            document.getElementById('modal-title').innerText = r.title;
            document.getElementById('modal-category').innerText = r.category;
            document.getElementById('modal-calories').innerText = r.calories || 0;
            document.getElementById('modal-protein').innerText = (r.protein || 0) + 'g';
            document.getElementById('modal-carbs').innerText = (r.carbs || 0) + 'g';
            document.getElementById('modal-fats').innerText = (r.fats || 0) + 'g';
            document.getElementById('modal-ingredients').innerText = r.ingredients || 'No especificados.';
            document.getElementById('modal-instructions').innerText = r.instructions || 'Sigue los pasos básicos de preparación saludable.';
            document.getElementById('modal-image').src = r.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=800';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        loadRecipes();
    </script>
</body>
</html>
