<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrición Saludable - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <nav id="main-nav"></nav>

    <header class="bg-blue-600 py-16 text-white text-center">
        <h1 class="text-4xl font-bold">Recetas Saludables</h1>
        <p class="mt-2 text-blue-100">Alimenta tus metas con estas deliciosas opciones.</p>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="recipes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cargando... -->
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-slate-200 h-48 rounded-xl"></div>
                <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        async function loadRecipes() {
            const container = document.getElementById('recipes-container');
            const { data, error } = await supabase
                .from('gym_recipes')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Error al cargar recetas: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-slate-500 col-span-full text-center">No hay recetas disponibles aún. ¡Agrega algunas desde el panel de admin!</p>`;
                return;
            }

            container.innerHTML = data.map(recipe => `
                <div class="card bg-white">
                    <img src="${recipe.image_url || 'https://via.placeholder.com/400x250?text=Receta'}" alt="${recipe.title}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">${recipe.category}</span>
                        <h3 class="text-xl font-bold mt-2 mb-3">${recipe.title}</h3>
                        <p class="text-slate-600 text-sm mb-4 line-clamp-3">${recipe.description}</p>
                        <div class="flex flex-col gap-2">
                            <details class="text-sm cursor-pointer group">
                                <summary class="font-semibold text-blue-500 hover:text-blue-700">Ver Ingredientes</summary>
                                <p class="mt-2 p-3 bg-slate-50 rounded italic">${recipe.ingredients}</p>
                            </details>
                            <details class="text-sm cursor-pointer group">
                                <summary class="font-semibold text-blue-500 hover:text-blue-700">Ver Preparación</summary>
                                <p class="mt-2 p-3 bg-slate-50 rounded">${recipe.instructions}</p>
                            </details>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        loadRecipes();
    </script>
</body>
</html>
