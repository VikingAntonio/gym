<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisbe Gym - Panel</title>
    <link rel="icon" type="image/png" sizes="1662x604" href="./assets/img/iconwisbe.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="neu-page min-h-screen">
    <button class="theme-toggle" id="themeToggle" title="Cambiar Tema">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <nav id="main-nav"></nav>

    <div class="container mx-auto px-4 py-12 text-center">
        <div class="mb-12 animate-fade">
            <a href="index.html">
                <i class="fas fa-dumbbell text-6xl text-emerald-600 mb-4 filter drop-shadow-lg"></i>
            </a>
        </div>

        <h1 class="text-2xl font-black uppercase tracking-widest opacity-80 mb-12">Panel Gym</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-20 animate-fade">
            <!-- Usuarios -->
            <a href="adminUsuarios.html" class="neu-card p-8 group">
                <i class="fas fa-users text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Usuarios</span>
            </a>

            <!-- Nutrición -->
            <a href="adminNutricion.html" class="neu-card p-8 group">
                <i class="fas fa-leaf text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Nutrición</span>
            </a>

            <!-- Rutinas -->
            <a href="adminRutinas.html" class="neu-card p-8 group">
                <i class="fas fa-dumbbell text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Rutinas</span>
            </a>

            <!-- Entrenadores -->
            <a href="adminEntrenadores.html" class="neu-card p-8 group">
                <i class="fas fa-user-tie text-4xl mb-4 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Equipo</span>
            </a>
        </div>

        <!-- Widget Section -->
        <section class="mt-20 text-left">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-xl font-black uppercase tracking-widest opacity-80">Widget</h2>
                <!-- Removed horizontal bar -->
            </div>

            <div class="neu-card p-10 md:p-14 text-left block">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                    <div>
                        <h4 class="text-xl font-bold mb-4 uppercase tracking-tight">Copia el código</h4>
                        <p class="text-sm mb-12 leading-relaxed opacity-70">Inserta tus módulos en cualquier sitio web utilizando estos fragmentos.</p>

                        <div class="space-y-10">
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-widest mb-4 block opacity-50">1. Script Global</label>
                                <div class="bg-black/10 rounded-2xl p-6 relative group border border-white/10">
                                    <code id="script-code" class="text-blue-500 font-mono text-xs block overflow-x-auto whitespace-nowrap">&lt;script src="https://wisbe.xyz/widget.js"&gt;&lt;/script&gt;</code>
                                    <button onclick="copyToClipboard('script-code')" class="absolute right-6 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase tracking-widest mb-4 block opacity-50">2. Contenedor</label>
                                <div class="bg-black/10 rounded-2xl p-6 relative group border border-white/10">
                                    <code id="widget-code" class="text-emerald-500 font-mono text-xs block overflow-x-auto whitespace-nowrap">&lt;div id="wisbe-rutinas" domain="..."&gt;&lt;/div&gt;</code>
                                    <button onclick="copyToClipboard('widget-code')" class="absolute right-6 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-center justify-center text-center p-10 bg-white/5 rounded-[40px] border border-white/10">
                        <i class="fas fa-globe text-4xl mb-6 opacity-40"></i>
                        <h5 class="font-black text-lg mb-3 uppercase tracking-widest">Dominio</h5>
                        <p id="user-domain" class="text-blue-500 font-mono font-black text-xl mb-6 uppercase tracking-tight">Cargando...</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { renderNavbar, Auth, showPopup, initTheme } from './assets/js/utils.js';

        const currentUser = await Auth.checkAccess(['gym-admin', 'gym-owner']);

        renderNavbar();
        initTheme();

        if (currentUser) {
            const domainText = currentUser.domain || 'SIN DOMINIO';
            document.getElementById('user-domain').innerText = domainText;

            if (currentUser.domain) {
                document.getElementById('widget-code').innerText = `<div id="wisbe-rutinas" domain="${currentUser.domain}"></div>`;
            } else {
                document.getElementById('widget-code').innerText = 'ERROR: CONFIGURA TU DOMINIO';
            }
        }

        window.copyToClipboard = (id) => {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showPopup('¡Copiado!', 'El fragmento de código está listo para usar');
            });
        };
    </script>
</body>
</html>
