<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Wisbe - Selección</title>
    <link rel="icon" type="image/png" sizes="1662x604" href="./assets/img/iconwisbe.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #44476a;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent-color: #ff6b00;
        }

        /* Dark Neumorphism Option (Optional, but let's stick to a clean light one first as it's more "classic" neumorphic, or maybe a dark one to match the brand?)
           Actually, the brand is luxury/dark. Let's try a sophisticated dark neumorphism. */

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --shadow-light: #252525;
            --shadow-dark: #0f0f0f;
            --accent-color: #ff6b00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Raleway', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            width: 200px;
            filter: drop-shadow(4px 4px 8px var(--shadow-dark));
        }

        .title {
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .menu-item {
            text-decoration: none;
            color: var(--text-color);
            background: var(--bg-color);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow-dark),
                        -9px -9px 16px var(--shadow-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            box-shadow: inset 9px 9px 16px var(--shadow-dark),
                        inset -9px -9px 16px var(--shadow-light);
            transform: scale(0.98);
            color: var(--accent-color);
        }

        .menu-item i {
            font-size: 3rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .menu-item span {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .menu-item:hover i {
            transform: translateY(-5px);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-grid {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .logo {
                width: 150px;
            }
        }

        /* Theme toggle button (optional but nice) */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: 5px 5px 10px var(--shadow-dark),
                        -5px -5px 10px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            border: none;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .theme-toggle:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
        }
    </style>
</head>
<body data-theme="dark">
    <button class="theme-toggle" id="themeToggle" title="Cambiar Tema">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="container">
        <div class="logo-container">
            <a href="index.html">
                <img src="./assets/img/wisbelogo.png" alt="Wisbe Logo" class="logo">
            </a>
        </div>

        <h1 class="title">Selecciona un Sistema</h1>

        <div class="menu-grid">
            <a href="contruccion.html" class="menu-item">
                <i class="bi bi-building"></i>
                <span>contruccion</span>
            </a>
            <a href="gym.html" class="menu-item">
                <i class="bi bi-activity"></i>
                <span>gym</span>
            </a>
            <a href="salonBelleza.html" class="menu-item">
                <i class="bi bi-scissors"></i>
                <span>Salon de belleza</span>
            </a>
            <a href="independientes.html" class="menu-item">
                <i class="bi bi-person-workspace"></i>
                <span>independientes</span>
            </a>
            <a href="tienda.html" class="menu-item">
                <i class="bi bi-bag-check"></i>
                <span>tienda</span>
            </a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');

        themeToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
            }
        });

        // Set initial icon
        if (body.getAttribute('data-theme') === 'dark') {
            icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
        } else {
            icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        }
    </script>
</body>
</html>
