<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinas Ultra Pro - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-slate-950 py-32 text-white text-center relative overflow-hidden">
        <div class="container mx-auto px-4 z-10 relative">
            <h1 class="text-7xl font-black mb-6 tracking-tighter italic">Engineered <span class="text-blue-600 not-italic">Strength</span></h1>
            <p class="text-slate-400 text-2xl max-w-4xl mx-auto font-light leading-relaxed">
                Planes de entrenamiento estructurados para cada nivel, género y condición física.
            </p>
        </div>
        <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-600 rounded-full blur-[150px] opacity-20"></div>
    </header>

    <main class="container mx-auto px-4 py-20">
        <!-- Ultra Filters -->
        <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 p-8 mb-20 flex flex-wrap gap-6 items-center justify-between">
            <div class="flex flex-wrap gap-4">
                <select id="filter-level" class="bg-slate-50 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 border-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="All">Dificultad: Todas</option>
                    <option value="Novato">Novato</option>
                    <option value="Guerrero">Guerrero</option>
                    <option value="Élite">Élite</option>
                </select>
                <select id="filter-gender" class="bg-slate-50 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 border-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="All">Género: Todos</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Unisex">Unisex</option>
                </select>
                <select id="filter-age" class="bg-slate-50 px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 border-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="All">Edad: Todas</option>
                    <option value="Niño">Niño</option>
                    <option value="Joven">Joven</option>
                    <option value="Adulto">Adulto</option>
                    <option value="Senior">Senior</option>
                </select>
            </div>
            <div id="results-count" class="text-xs font-black uppercase tracking-widest text-slate-400">Cargando planes...</div>
        </div>

        <div id="routines-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- Ultra Modal -->
    <div id="routine-modal" class="fixed inset-0 bg-slate-950/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-6xl max-h-[92vh] rounded-[50px] overflow-hidden shadow-2xl flex flex-col xl:flex-row border border-white/20">
            <div class="xl:w-4/12 h-64 xl:h-auto relative bg-slate-900">
                <img id="modal-image" src="" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent flex flex-col justify-end p-10">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span id="modal-level" class="text-[10px] font-black uppercase bg-blue-600 text-white px-3 py-1.5 rounded-xl shadow-lg"></span>
                        <span id="modal-gender" class="text-[10px] font-black uppercase bg-white/20 text-white px-3 py-1.5 rounded-xl backdrop-blur-md"></span>
                    </div>
                    <h2 id="modal-title" class="text-4xl font-black text-white leading-tight"></h2>
                </div>
            </div>
            <div class="xl:w-8/12 p-8 xl:p-12 overflow-y-auto bg-white flex flex-col">
                <div class="flex justify-between items-center mb-10">
                    <div id="weeks-nav" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        <!-- Botones de semana dinámicos -->
                    </div>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-blue-600 transition-all text-2xl ml-4"><i class="fas fa-times-circle"></i></button>
                </div>

                <p id="modal-desc" class="text-slate-500 text-lg font-medium mb-10 leading-relaxed max-w-2xl"></p>

                <div id="modal-days" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
                    <!-- Días inyectados dinámicamente -->
                </div>

                <div class="mt-auto pt-8 border-t border-slate-50 flex flex-wrap gap-6">
                    <div class="flex items-center text-slate-400 font-bold text-xs uppercase tracking-widest">
                        <i class="fas fa-heart-pulse mr-2 text-red-500"></i> Condición: <span id="modal-health" class="text-slate-900 ml-2"></span>
                    </div>
                    <div class="flex items-center text-slate-400 font-bold text-xs uppercase tracking-widest">
                        <i class="fas fa-hourglass-half mr-2 text-blue-500"></i> Duración: <span id="modal-duration" class="text-slate-900 ml-2"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        const grid = document.getElementById('routines-grid');
        const modal = document.getElementById('routine-modal');
        let allRoutines = [];
        let currentRoutine = null;

        async function loadRoutines() {
            const params = new URLSearchParams(window.location.search);
            const domain = params.get('domain');

            let query = supabase.from('gym_routines').select('*').order('created_at', { ascending: false });

            if (domain) {
                const { data: userData, error: userError } = await supabase.from('gym_users')
                    .select('id')
                    .eq('domain', domain)
                    .eq('role', 'gym-owner')
                    .maybeSingle();

                if (userData) {
                    query = query.eq('owner_id', userData.id);
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center text-slate-500 font-bold py-20">Gimnasio no encontrado para el dominio especificado.</div>';
                    document.getElementById('results-count').innerText = '0 Planes Encontrados';
                    return;
                }
            }

            const { data, error } = await query;
            if (error) return;
            allRoutines = data;
            filterRoutines();
        }

        function filterRoutines() {
            const level = document.getElementById('filter-level').value;
            const gender = document.getElementById('filter-gender').value;
            const age = document.getElementById('filter-age').value;

            const filtered = allRoutines.filter(r => {
                return (level === 'All' || r.difficulty_level === level) &&
                       (gender === 'All' || r.target_gender === gender || r.target_gender === 'Unisex') &&
                       (age === 'All' || r.target_age_group === age || r.target_age_group === 'Cualquiera');
            });

            document.getElementById('results-count').innerText = `${filtered.length} Planes Encontrados`;
            renderGrid(filtered);
        }

        function renderGrid(data) {
            grid.innerHTML = data.map(r => `
                <div class="bg-white rounded-[50px] shadow-sm border border-slate-50 overflow-hidden group hover:shadow-2xl hover:-translate-y-2 transition-all duration-700">
                    <div class="h-72 relative overflow-hidden bg-slate-200">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=600'}"
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-1000 grayscale group-hover:grayscale-0">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent flex flex-col justify-end p-10">
                            <span class="text-[10px] font-black text-white uppercase bg-blue-600 w-fit px-4 py-1.5 rounded-xl mb-4 shadow-xl shadow-blue-900/40">${r.difficulty_level}</span>
                            <h3 class="text-3xl font-black text-white tracking-tight">${r.title}</h3>
                        </div>
                    </div>
                    <div class="p-10">
                        <div class="flex justify-between items-center mb-10 border-b border-slate-50 pb-6 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <span><i class="fas fa-venus-mars mr-2 text-blue-500"></i> ${r.target_gender}</span>
                            <span><i class="fas fa-clock mr-2 text-blue-500"></i> ${r.plan_duration_weeks} Semanas</span>
                        </div>
                        <button onclick='openModal(${JSON.stringify(r).replace(/'/g, "&apos;")})'
                                class="w-full py-5 bg-slate-950 hover:bg-blue-600 text-white font-black rounded-3xl transition-all shadow-xl hover:shadow-blue-200 uppercase tracking-widest text-xs">
                            Analizar Plan
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = (r) => {
            currentRoutine = r;
            document.getElementById('modal-title').innerText = r.title;
            document.getElementById('modal-desc').innerText = r.description || 'Este plan ha sido optimizado para maximizar la respuesta metabólica y fuerza.';
            document.getElementById('modal-level').innerText = r.difficulty_level;
            document.getElementById('modal-gender').innerText = r.target_gender;
            document.getElementById('modal-health').innerText = r.health_conditions;
            document.getElementById('modal-duration').innerText = `${r.plan_duration_weeks} Semanas`;
            document.getElementById('modal-image').src = r.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=800';

            // Build Weeks Nav
            const weeksNav = document.getElementById('weeks-nav');
            weeksNav.innerHTML = r.exercises.map((w, idx) => `
                <button onclick="renderWeek(${idx})" class="week-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${idx === 0 ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}">
                    ${w.week}
                </button>
            `).join('');

            renderWeek(0);

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        window.renderWeek = (idx) => {
            // Update UI buttons
            document.querySelectorAll('.week-btn').forEach((btn, i) => {
                if (i === idx) {
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
                    btn.classList.remove('bg-slate-50', 'text-slate-400');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                    btn.classList.add('bg-slate-50', 'text-slate-400');
                }
            });

            const week = currentRoutine.exercises[idx];
            const daysContainer = document.getElementById('modal-days');
            daysContainer.innerHTML = week.days.map(d => `
                <div class="bg-slate-50 rounded-[30px] p-8 border border-slate-100 shadow-sm animate-fade-in">
                    <h4 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-6 border-b border-slate-200 pb-4 flex justify-between">
                        ${d.day} <i class="fas fa-dumbbell text-blue-500 opacity-50"></i>
                    </h4>
                    <ul class="space-y-4">
                        ${d.moves.map(m => `
                            <li class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col space-y-2">
                                <span class="font-black text-slate-800 text-sm tracking-tight">${m.name}</span>
                                <div class="flex gap-4 text-[10px] font-black uppercase text-blue-600">
                                    <span>${m.sets} Sets</span>
                                    <span class="text-slate-300">/</span>
                                    <span>${m.reps} Reps</span>
                                    <span class="text-slate-300">/</span>
                                    <span class="text-slate-400">⏳ ${m.rest}</span>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        window.closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        ['filter-level', 'filter-gender', 'filter-age'].forEach(id => {
            document.getElementById(id).addEventListener('change', filterRoutines);
        });

        loadRoutines();
    </script>
</body>
</html>
