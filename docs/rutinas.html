<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinas y Ejercicios - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-orange-600 py-20 text-white text-center">
        <div class="container mx-auto px-4">
            <h1 class="text-5xl font-extrabold mb-4">Rutinas de Entrenamiento</h1>
            <p class="text-orange-100 text-xl max-w-2xl mx-auto font-light">
                Planes diseñados por expertos para ayudarte a alcanzar tu máximo potencial físico.
            </p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16">
        <div id="routines-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cargando... -->
        </div>
    </main>

    <!-- Modal para ver Rutina Completa -->
    <div id="routine-modal" class="fixed inset-0 bg-slate-900/80 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col lg:flex-row">
            <div class="lg:w-1/3 h-48 lg:h-auto bg-slate-200">
                <img id="modal-image" src="" class="w-full h-full object-cover">
            </div>
            <div class="lg:w-2/3 p-8 overflow-y-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="modal-level" class="text-[10px] font-bold uppercase tracking-widest text-orange-600 bg-orange-50 px-3 py-1 rounded-full border border-orange-100 mb-2 inline-block"></span>
                        <h2 id="modal-title" class="text-3xl font-bold text-slate-800"></h2>
                    </div>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl"><i class="fas fa-times"></i></button>
                </div>

                <p id="modal-desc" class="text-slate-500 mb-8 border-l-4 border-orange-500 pl-4"></p>

                <div id="modal-exercises" class="space-y-6">
                    <!-- Los días y ejercicios se inyectan aquí -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        const grid = document.getElementById('routines-grid');
        const modal = document.getElementById('routine-modal');

        async function loadRoutines() {
            const { data, error } = await supabase.from('gym_routines').select('*').order('created_at', { ascending: false });
            if (error) return;

            grid.innerHTML = data.map(r => `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                    <div class="h-56 relative group">
                        <img src="${r.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=600'}"
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent flex flex-col justify-end p-6">
                            <span class="text-[10px] font-bold text-white uppercase bg-orange-600 w-fit px-3 py-1 rounded-full mb-2">${r.goal}</span>
                            <h3 class="text-xl font-bold text-white">${r.title}</h3>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center text-xs font-bold text-slate-400">
                                <i class="fas fa-signal mr-2 text-orange-500"></i> ${r.level}
                            </div>
                            <div class="flex items-center text-xs font-bold text-slate-400">
                                <i class="fas fa-clock mr-2 text-orange-500"></i> 4 Semanas
                            </div>
                        </div>
                        <button onclick='openModal(${JSON.stringify(r).replace(/'/g, "&apos;")})'
                                class="w-full py-4 bg-slate-900 hover:bg-orange-600 text-white font-bold rounded-2xl transition-all shadow-lg hover:shadow-orange-200">
                            Ver Rutina Completa
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = (r) => {
            document.getElementById('modal-title').innerText = r.title;
            document.getElementById('modal-desc').innerText = r.description || 'Prepárate para darlo todo en este plan de entrenamiento.';
            document.getElementById('modal-level').innerText = r.level;
            document.getElementById('modal-image').src = r.image_url || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=600';

            const exercisesContainer = document.getElementById('modal-exercises');
            exercisesContainer.innerHTML = r.exercises.map(day => `
                <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                    <h4 class="text-lg font-extrabold text-slate-800 mb-4 flex items-center">
                        <i class="far fa-calendar-alt mr-2 text-orange-500"></i> ${day.day}
                    </h4>
                    <ul class="space-y-3">
                        ${day.moves.map(m => `
                            <li class="flex items-center justify-between text-sm bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                <span class="font-bold text-slate-700">${m.name}</span>
                                <div class="flex space-x-4 font-bold text-orange-600">
                                    <span title="Sets">S: ${m.sets}</span>
                                    <span title="Reps">R: ${m.reps}</span>
                                    <span title="Descanso" class="text-slate-400 font-medium">⏳ ${m.rest}</span>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        loadRoutines();
    </script>
</body>
</html>
