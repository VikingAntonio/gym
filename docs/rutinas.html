<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinas de Impacto - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">
    <nav id="main-nav"></nav>

    <header class="bg-orange-600 py-16 text-white text-center">
        <h1 class="text-4xl font-bold">Rutinas y Ejercicios</h1>
        <p class="mt-2 text-orange-100">Alcanza tus objetivos con planes diseñados para cada nivel.</p>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="routines-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cargando... -->
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-slate-200 h-48 rounded-xl"></div>
                <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        async function loadRoutines() {
            const container = document.getElementById('routines-container');
            const { data, error } = await supabase
                .from('gym_routines')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Error al cargar rutinas: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-slate-500 col-span-full text-center">No hay rutinas disponibles aún. ¡Agrega algunas desde el panel de admin!</p>`;
                return;
            }

            container.innerHTML = data.map(routine => `
                <div class="card bg-white">
                    <img src="${routine.image_url || 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=1470'}" alt="${routine.title}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                             <span class="text-xs font-bold text-orange-600 uppercase tracking-wider">${routine.level}</span>
                             <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">${routine.goal}</span>
                        </div>
                        <h3 class="text-xl font-bold mt-2 mb-3">${routine.title}</h3>
                        <p class="text-slate-600 text-sm mb-4 line-clamp-3">${routine.description}</p>

                        <details class="text-sm cursor-pointer group">
                            <summary class="font-semibold text-orange-500 hover:text-orange-700">Ver Ejercicios</summary>
                            <div class="mt-2 p-3 bg-slate-50 rounded italic whitespace-pre-line">${routine.exercises}</div>
                        </details>
                    </div>
                </div>
            `).join('');
        }

        loadRoutines();
    </script>
</body>
</html>
