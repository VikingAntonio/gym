<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Evaluación - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">
    <nav id="main-nav"></nav>

    <header class="bg-indigo-600 py-16 text-white text-center">
        <h1 class="text-4xl font-bold">Plan Personalizado</h1>
        <p class="mt-2 text-indigo-100">Responde unas preguntas y obtén tu dieta y rutina semanal.</p>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <form id="test-form" class="bg-white p-8 rounded-2xl shadow-xl space-y-8 animate-fade-in">
            <!-- Paso 1 -->
            <div class="space-y-4">
                <h3 class="text-xl font-bold text-slate-800 border-b pb-2">1. Sobre ti</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Edad</label>
                        <input type="number" id="age" required class="input-field" placeholder="Tu edad">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Género</label>
                        <select id="gender" class="input-field">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Peso actual (kg)</label>
                        <input type="number" id="weight" required class="input-field" placeholder="Ej: 75">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Altura (cm)</label>
                        <input type="number" id="height" required class="input-field" placeholder="Ej: 175">
                    </div>
                </div>
            </div>

            <!-- Paso 2 -->
            <div class="space-y-4">
                <h3 class="text-xl font-bold text-slate-800 border-b pb-2">2. Tus Metas</h3>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">¿Cuál es tu objetivo principal?</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                            <input type="radio" name="goal" value="Perder peso" checked class="w-4 h-4 text-indigo-600">
                            <span class="ml-3 font-medium text-slate-700">Perder grasa corporal</span>
                        </label>
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                            <input type="radio" name="goal" value="Ganar músculo" class="w-4 h-4 text-indigo-600">
                            <span class="ml-3 font-medium text-slate-700">Ganar masa muscular</span>
                        </label>
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                            <input type="radio" name="goal" value="Mantenimiento" class="w-4 h-4 text-indigo-600">
                            <span class="ml-3 font-medium text-slate-700">Mantenimiento y Salud</span>
                        </label>
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                            <input type="radio" name="goal" value="Resistencia" class="w-4 h-4 text-indigo-600">
                            <span class="ml-3 font-medium text-slate-700">Mejorar Resistencia</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Paso 3 -->
            <div class="space-y-4">
                <h3 class="text-xl font-bold text-slate-800 border-b pb-2">3. Tu Nivel de Actividad</h3>
                <select id="activity" class="input-field">
                    <option value="Sedentario">Sedentario (Poco o nada de ejercicio)</option>
                    <option value="Ligero">Ligero (1-3 días a la semana)</option>
                    <option value="Moderado">Moderado (3-5 días a la semana)</option>
                    <option value="Intenso">Intenso (6-7 días a la semana)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary w-full bg-indigo-600 hover:bg-indigo-700 text-lg py-4">Generar Mi Plan Ahora</button>
        </form>

        <!-- Resultados -->
        <div id="results" class="mt-12 space-y-8 hidden animate-fade-in">
            <h2 class="text-3xl font-extrabold text-center text-slate-800">Tu Plan Personalizado</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Dieta -->
                <div class="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-green-500">
                    <h3 class="text-2xl font-bold mb-6 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                        Dieta Semanal
                    </h3>
                    <div id="diet-content" class="space-y-4 text-slate-600"></div>
                </div>

                <!-- Rutina -->
                <div class="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-orange-500">
                    <h3 class="text-2xl font-bold mb-6 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Rutina Semanal
                    </h3>
                    <div id="routine-content" class="space-y-4 text-slate-600"></div>
                </div>
            </div>

            <div class="text-center pb-12">
                <button onclick="window.print()" class="text-indigo-600 font-bold hover:underline">Imprimir mi plan</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('test-form');
        const results = document.getElementById('results');
        const dietContent = document.getElementById('diet-content');
        const routineContent = document.getElementById('routine-content');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const goal = document.querySelector('input[name="goal"]:checked').value;
            const activity = document.getElementById('activity').value;

            generatePlan(goal, activity);

            form.classList.add('hidden');
            results.classList.remove('hidden');
            results.scrollIntoView({ behavior: 'smooth' });
        });

        function generatePlan(goal, activity) {
            let diet = "";
            let routine = "";

            if (goal === "Perder peso") {
                diet = `
                    <p><strong>Lunes a Viernes:</strong> Déficit calórico moderado.</p>
                    <ul class="list-disc ml-5">
                        <li>Desayuno: Tortilla de claras y espinaca.</li>
                        <li>Comida: Pechuga de pollo con brócoli y media taza de arroz integral.</li>
                        <li>Cena: Pescado blanco al vapor con ensalada verde.</li>
                    </ul>
                    <p class="mt-4 italic">Sugerencia: Bebe 3 litros de agua al día y evita azúcares procesados.</p>
                `;
                routine = `
                    <p><strong>Frecuencia:</strong> 4-5 veces por semana.</p>
                    <ul class="list-disc ml-5">
                        <li>30 min de cardio moderado (Caminar rápido o elíptica).</li>
                        <li>Circuito de fuerza: 3 series de 15 reps de sentadillas, flexiones y planchas.</li>
                        <li>Finaliza con 10 min de estiramientos.</li>
                    </ul>
                `;
            } else if (goal === "Ganar músculo") {
                diet = `
                    <p><strong>Lunes a Viernes:</strong> Superávit calórico controlado.</p>
                    <ul class="list-disc ml-5">
                        <li>Desayuno: Avena con plátano, nueces y batido de proteína.</li>
                        <li>Comida: Pasta integral con carne de ternera magra y verduras.</li>
                        <li>Cena: Salmón con batata (camote) al horno.</li>
                    </ul>
                    <p class="mt-4 italic">Sugerencia: Consume proteína en todas tus comidas principales.</p>
                `;
                routine = `
                    <p><strong>Frecuencia:</strong> 4 veces por semana.</p>
                    <ul class="list-disc ml-5">
                        <li>Día 1: Empuje (Pecho, Hombros, Tríceps).</li>
                        <li>Día 2: Tracción (Espalda, Bíceps).</li>
                        <li>Día 3: Piernas (Cuádriceps, Femorales).</li>
                        <li>Día 4: Híbrido y core.</li>
                    </ul>
                `;
            } else {
                diet = `
                    <p><strong>Lunes a Viernes:</strong> Equilibrio nutricional.</p>
                    <ul class="list-disc ml-5">
                        <li>Dieta variada rica en micronutrientes.</li>
                        <li>Proporciones: 40% carbohidratos, 30% proteínas, 30% grasas saludables.</li>
                    </ul>
                `;
                routine = `
                    <p><strong>Frecuencia:</strong> 3-4 veces por semana.</p>
                    <ul class="list-disc ml-5">
                        <li>Combinación de Yoga/Pilates con ejercicios de fuerza básica.</li>
                        <li>Caminatas diarias de al menos 30 minutos.</li>
                    </ul>
                `;
            }

            dietContent.innerHTML = diet;
            routineContent.innerHTML = routine;
        }
    </script>
</body>
</html>
