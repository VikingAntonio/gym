<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Perfil - Plataforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-white border-b border-slate-200 py-16 text-center">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">Análisis de Perfil</h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Responde a unas breves preguntas para generar una recomendación personalizada de entrenamiento y nutrición.</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 max-w-3xl">
        <form id="test-form" class="bg-white p-10 md:p-14 rounded-[40px] shadow-sm border border-slate-200 space-y-12 animate-fade-in">
            <!-- Paso 1 -->
            <div class="space-y-6">
                <h3 class="text-xs font-bold text-blue-600 uppercase tracking-[0.2em] flex items-center">
                    <span class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center mr-3 text-[10px]">1</span> Datos Biométricos
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Edad</label>
                        <input type="number" id="age" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="Tu edad">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Género</label>
                        <select id="gender" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Peso (kg)</label>
                        <input type="number" id="weight" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="Ej: 75">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Altura (cm)</label>
                        <input type="number" id="height" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="Ej: 175">
                    </div>
                </div>
            </div>

            <!-- Paso 2 -->
            <div class="space-y-6">
                <h3 class="text-xs font-bold text-blue-600 uppercase tracking-[0.2em] flex items-center">
                    <span class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center mr-3 text-[10px]">2</span> Objetivos
                </h3>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">¿Cuál es tu meta principal?</label>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="flex items-center p-5 border border-slate-100 bg-slate-50 rounded-2xl cursor-pointer hover:bg-white hover:border-blue-200 transition-all group">
                            <input type="radio" name="goal" value="Perder peso" checked class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                            <span class="ml-4 font-bold text-sm text-slate-700">Reducción de grasa corporal</span>
                        </label>
                        <label class="flex items-center p-5 border border-slate-100 bg-slate-50 rounded-2xl cursor-pointer hover:bg-white hover:border-blue-200 transition-all group">
                            <input type="radio" name="goal" value="Ganar músculo" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                            <span class="ml-4 font-bold text-sm text-slate-700">Aumento de masa muscular</span>
                        </label>
                        <label class="flex items-center p-5 border border-slate-100 bg-slate-50 rounded-2xl cursor-pointer hover:bg-white hover:border-blue-200 transition-all group">
                            <input type="radio" name="goal" value="Mantenimiento" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                            <span class="ml-4 font-bold text-sm text-slate-700">Salud y mantenimiento</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Paso 3 -->
            <div class="space-y-6">
                <h3 class="text-xs font-bold text-blue-600 uppercase tracking-[0.2em] flex items-center">
                    <span class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center mr-3 text-[10px]">3</span> Estilo de Vida
                </h3>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Nivel de Actividad Diaria</label>
                    <select id="activity" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-sm font-medium appearance-none">
                        <option value="Sedentario">Sedentario (Poco o nada de ejercicio)</option>
                        <option value="Ligero">Actividad Ligera (1-3 días/semana)</option>
                        <option value="Moderado">Actividad Moderada (3-5 días/semana)</option>
                        <option value="Intenso">Actividad Intensa (Diario)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-bold uppercase tracking-widest text-[10px] shadow-xl shadow-slate-200 hover:bg-blue-600 transition-all active:scale-95">Generar Mi Plan Personalizado</button>
        </form>

        <!-- Resultados -->
        <div id="results" class="mt-20 space-y-12 hidden animate-fade-in">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Tu Estrategia Personalizada</h2>
                <p class="text-slate-400 font-medium uppercase tracking-widest text-[10px]">Basado en tus métricas actuales</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Dieta -->
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-200">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-8 text-xl">
                        <i class="fas fa-apple-whole"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-6">Guía Nutricional</h3>
                    <div id="diet-content" class="space-y-4 text-slate-500 text-sm leading-relaxed font-medium"></div>
                </div>

                <!-- Rutina -->
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-slate-200">
                    <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center mb-8 text-xl">
                        <i class="fas fa-bolt-lightning"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-6">Plan de Entrenamiento</h3>
                    <div id="routine-content" class="space-y-4 text-slate-500 text-sm leading-relaxed font-medium"></div>
                </div>
            </div>

            <div class="text-center pb-20">
                <button onclick="window.print()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-all">
                    <i class="fas fa-print mr-2"></i> Guardar como PDF
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { renderNavbar } from './js/utils.js';
        renderNavbar();

        const form = document.getElementById('test-form');
        const results = document.getElementById('results');
        const dietContent = document.getElementById('diet-content');
        const routineContent = document.getElementById('routine-content');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const goal = document.querySelector('input[name="goal"]:checked').value;
            const activity = document.getElementById('activity').value;

            generatePlan(goal, activity);

            form.classList.add('hidden');
            results.classList.remove('hidden');
            results.scrollIntoView({ behavior: 'smooth' });
        });

        function generatePlan(goal, activity) {
            let diet = "";
            let routine = "";

            if (goal === "Perder peso") {
                diet = `
                    <p class="font-bold text-slate-800">Estrategia: Déficit calórico controlado</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Prioriza proteínas magras y vegetales fibrosos.</li>
                        <li>Reduce el consumo de harinas refinadas y azúcares.</li>
                        <li>Mantén una hidratación constante (35ml por kg de peso).</li>
                    </ul>
                `;
                routine = `
                    <p class="font-bold text-slate-800">Enfoque: Resistencia Metabólica</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Frecuencia: 4-5 sesiones semanales.</li>
                        <li>Combina entrenamiento de fuerza con intervalos de alta intensidad (HIIT).</li>
                        <li>Asegura un mínimo de 10,000 pasos diarios para mantener el NEAT elevado.</li>
                    </ul>
                `;
            } else if (goal === "Ganar músculo") {
                diet = `
                    <p class="font-bold text-slate-800">Estrategia: Superávit calórico óptimo</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Aumenta la ingesta de carbohidratos complejos (Avena, Arroz, Batata).</li>
                        <li>Consumo proteico: 1.8g a 2.2g por kg de peso corporal.</li>
                        <li>No descuides las grasas saludables para el soporte hormonal.</li>
                    </ul>
                `;
                routine = `
                    <p class="font-bold text-slate-800">Enfoque: Hipertrofia Estructural</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Frecuencia: 4-5 sesiones con foco en sobrecarga progresiva.</li>
                        <li>Rango de repeticiones: 8-12 con foco en la fase excéntrica.</li>
                        <li>Asegura descansos de entre 60 y 90 segundos entre series.</li>
                    </ul>
                `;
            } else {
                diet = `
                    <p class="font-bold text-slate-800">Estrategia: Nutrición Balanceada</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Dieta variada basada en alimentos reales y mínimamente procesados.</li>
                        <li>Distribución equilibrada de macronutrientes.</li>
                    </ul>
                `;
                routine = `
                    <p class="font-bold text-slate-800">Enfoque: Salud Funcional</p>
                    <ul class="list-disc ml-5 space-y-2">
                        <li>Frecuencia: 3-4 sesiones variadas.</li>
                        <li>Mezcla ejercicios de movilidad, fuerza y resistencia cardiovascular.</li>
                    </ul>
                `;
            }

            dietContent.innerHTML = diet;
            routineContent.innerHTML = routine;
        }
    </script>
</body>
</html>
