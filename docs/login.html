<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Elite - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-premium {
            @apply w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white focus:ring-0 transition-all font-medium text-slate-700;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Decor -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full blur-[120px] opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600 rounded-full blur-[120px] opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="max-w-md w-full glass-card rounded-[50px] shadow-2xl overflow-hidden relative z-10 border border-white/10 animate-fade-in">
        <div class="p-10 md:p-14">
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-[30px] mb-6 shadow-inner">
                    <i class="fas fa-bolt text-3xl text-blue-600"></i>
                </div>
                <h1 class="text-4xl font-black tracking-tighter text-slate-900 italic mb-2">GYM <span class="text-blue-600 not-italic">PRO</span></h1>
                <p id="form-title" class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Portal de Administración Elite</p>
            </div>

            <form id="auth-form" class="space-y-5">
                <div id="register-fields" class="hidden space-y-5">
                    <div class="relative group">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Nombre Completo</label>
                        <i class="fas fa-user absolute left-5 top-[42px] text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="full_name" class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[24px] focus:border-blue-500 focus:bg-white focus:ring-0 transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium" placeholder="Tu nombre real">
                    </div>
                    <div class="relative group">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Dominio del Gimnasio</label>
                        <i class="fas fa-globe absolute left-5 top-[42px] text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="domain" class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[24px] focus:border-blue-500 focus:bg-white focus:ring-0 transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium" placeholder="ejemplo-gym.com">
                    </div>
                </div>

                <div class="relative group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Correo Electrónico</label>
                    <i class="fas fa-envelope absolute left-5 top-[42px] text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="email" id="email" required class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[24px] focus:border-blue-500 focus:bg-white focus:ring-0 transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium" placeholder="admin@tusitio.com">
                </div>

                <div class="relative group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Contraseña Segura</label>
                    <i class="fas fa-shield-halved absolute left-5 top-[42px] text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="password" id="password" required class="w-full pl-12 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-[24px] focus:border-blue-500 focus:bg-white focus:ring-0 transition-all font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-medium" placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 btn-gradient text-white rounded-[24px] font-black uppercase tracking-[0.2em] text-xs shadow-2xl shadow-blue-500/40 hover:-translate-y-1 active:scale-95 transition-all duration-300">
                    <span id="btn-text">Entrar al Sistema</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-circle-notch animate-spin mr-3"></i> Sincronizando...</span>
                </button>
            </form>

            <div class="mt-10 text-center">
                <button id="toggle-mode" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:text-blue-800 transition-colors border-b-2 border-blue-100 pb-1">
                    ¿Eres nuevo? Crea tu cuenta de Owner
                </button>
            </div>

            <div id="status-msg" class="hidden mt-8 p-5 rounded-[24px] text-xs font-bold text-center animate-fade-in">
                <!-- Errores o Avisos -->
            </div>
        </div>

        <div class="bg-slate-50/50 p-6 text-center border-t border-slate-100 flex items-center justify-center space-x-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Servidor Wisbe.xyz Activo v4.0</p>
        </div>
    </div>

    <script type="module">
        import { Auth, showPopup } from './js/utils.js';

        const form = document.getElementById('auth-form');
        const statusMsg = document.getElementById('status-msg');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-mode');
        const registerFields = document.getElementById('register-fields');
        const formTitle = document.getElementById('form-title');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            statusMsg.classList.add('hidden');
            if (isLogin) {
                formTitle.innerText = 'Portal de Administración Elite';
                btnText.innerText = 'Entrar al Sistema';
                toggleBtn.innerText = '¿Eres nuevo? Crea tu cuenta de Owner';
                registerFields.classList.add('hidden');
            } else {
                formTitle.innerText = 'Registro de Gimnasio Wisbe';
                btnText.innerText = 'Iniciar mi Plataforma';
                toggleBtn.innerText = '¿Ya tienes cuenta? Acceder ahora';
                registerFields.classList.remove('hidden');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            try {
                if (isLogin) {
                    const profile = await Auth.login(email, pass);
                    window.location.href = 'admin.html';
                } else {
                    const full_name = document.getElementById('full_name').value.trim();
                    const domain = document.getElementById('domain').value.trim();

                    if (!full_name) throw new Error('El nombre es obligatorio');

                    await Auth.register(email, pass, {
                        full_name,
                        domain,
                        role: 'gym-owner'
                    });

                    await showPopup('¡Registro Exitoso!', 'Tu cuenta ha sido creada. REVISA TU BANDEJA DE ENTRADA y confirma tu correo electrónico para poder entrar.');

                    // Switch to login
                    isLogin = true;
                    formTitle.innerText = 'Portal de Administración Elite';
                    btnText.innerText = 'Entrar al Sistema';
                    toggleBtn.innerText = '¿Eres nuevo? Crea tu cuenta de Owner';
                    registerFields.classList.add('hidden');

                    statusMsg.innerHTML = '<i class="fas fa-envelope-circle-check mr-2"></i> Por favor confirma tu correo para continuar';
                    statusMsg.className = 'mt-8 p-5 rounded-[24px] text-[10px] font-black uppercase tracking-widest text-center animate-fade-in bg-blue-50 text-blue-600';
                    statusMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                let errorMessage = err.message;

                // Friendly error translation
                if (errorMessage.includes('Email not confirmed')) {
                    errorMessage = 'DEBES CONFIRMAR TU EMAIL. Revisa tu correo electrónico antes de entrar.';
                } else if (errorMessage.includes('Invalid login credentials')) {
                    errorMessage = 'Email o contraseña incorrectos. Verifica tus datos.';
                }

                statusMsg.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> ${errorMessage}`;
                statusMsg.className = 'mt-8 p-5 rounded-[24px] text-[10px] font-black uppercase tracking-widest text-center animate-fade-in bg-red-50 text-red-500';
                statusMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
