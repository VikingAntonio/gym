<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --brand-blue: #1e40af; /* Indigo blue */
            --brand-hover: #1e3a8a;
            --bg-page: #f9fafb;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #111827;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: #fdfdfd;
            border: 1.5px solid #e5e7eb;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }

        .btn-brand {
            background-color: var(--brand-blue);
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s ease;
            display: block;
            width: 100%;
            text-align: center;
        }

        .btn-brand:hover {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
        }

        .btn-brand:active {
            transform: translateY(0);
        }

        .label-style {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }

        .logo-img {
            max-height: 60px;
            width: auto;
            margin: 0 auto 32px;
        }

        #toggle-auth {
            color: var(--brand-blue);
            font-weight: 700;
            cursor: pointer;
        }

        #toggle-auth:hover {
            text-decoration: underline;
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="login-card w-full max-w-md p-8 md:p-12 animate-fade">
        <header class="text-center mb-8">
            <img src="https://wisbe.xyz/assets/img/wisbelogo.png" alt="Wisbe Logo" class="logo-img">
            <h1 id="page-title" class="text-2xl font-800 tracking-tight text-gray-900">Login</h1>
        </header>

        <form id="auth-form" class="space-y-6">
            <div id="register-fields" class="hidden space-y-4">
                <div>
                    <label class="label-style">Full Name</label>
                    <input type="text" id="full_name" class="input-field" placeholder="">
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="label-style">Email Address</label>
                    <input type="email" id="email" required class="input-field" placeholder="">
                </div>
                <div>
                    <label class="label-style">Password</label>
                    <input type="password" id="password" required class="input-field" placeholder="">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" id="submit-btn" class="btn-brand uppercase tracking-wider">
                    Login
                </button>
            </div>
        </form>

        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500 font-medium">
                <span id="toggle-text">Don't have an account?</span>
                <button id="toggle-auth" class="ml-1">Sign Up</button>
            </p>
        </div>
    </div>

    <script type="module">
        import { Auth, showPopup } from './assets/js/utils.js';

        // Check if user is already logged in
        const existingUser = Auth.getUser();
        if (existingUser) {
            window.location.href = Auth.getRedirectUrl(existingUser);
        }

        let isLogin = true;
        const form = document.getElementById('auth-form');
        const registerFields = document.getElementById('register-fields');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const pageTitle = document.getElementById('page-title');
        const toggleText = document.getElementById('toggle-text');

        toggleBtn.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            registerFields.classList.toggle('hidden');
            pageTitle.innerText = isLogin ? 'Login' : 'Register';
            submitBtn.innerText = isLogin ? 'Login' : 'Create Account';
            toggleText.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleBtn.innerText = isLogin ? 'Sign Up' : 'Login';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'PROCESSING...';

                if (isLogin) {
                    const user = await Auth.login(email, password);
                    window.location.href = Auth.getRedirectUrl(user);
                } else {
                    const fullName = document.getElementById('full_name').value;

                    if (!fullName) throw new Error('Full name is required');

                    await Auth.register(email, password, {
                        full_name: fullName,
                        role: 'gym-owner',
                        business_unit: 'gym'
                    });

                    showPopup('Registration Successful', 'Please confirm your email address to activate your account.', 'success');
                    isLogin = true;
                    toggleBtn.click();
                }
            } catch (err) {
                showPopup('Access Error', err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? 'Login' : 'Create Account';
            }
        };
    </script>
</body>
</html>
