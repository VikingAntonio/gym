<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[40px] shadow-2xl overflow-hidden animate-fade-in">
        <div class="p-8 md:p-12">
            <div class="text-center mb-10">
                <a href="index.html" class="text-3xl font-black tracking-tighter text-blue-600 italic">GYM <span class="text-slate-900 not-italic">PRO</span></a>
                <h2 class="text-xl font-bold text-slate-800 mt-4">Bienvenido de nuevo</h2>
                <p class="text-slate-400 text-sm">Ingresa tus credenciales para acceder</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-2">Usuario</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="username" required
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all font-medium text-slate-700"
                               placeholder="Antonio">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-2">Contraseña</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" required
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all font-medium text-slate-700"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="login-btn"
                        class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-blue-200 hover:bg-blue-700 hover:-translate-y-1 transition-all">
                    <span id="btn-text">Entrar al Sistema</span>
                    <span id="btn-loading" class="hidden"><i class="fas fa-circle-notch animate-spin mr-2"></i> Verificando...</span>
                </button>
            </form>

            <div id="error-msg" class="hidden mt-6 p-4 bg-red-50 text-red-500 text-xs font-bold rounded-xl text-center">
                <i class="fas fa-exclamation-circle mr-2"></i> Credenciales inválidas
            </div>
        </div>

        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Protegido por Sistema GYM PRO v2.0</p>
        </div>
    </div>

    <script type="module">
        import { Auth } from './js/utils.js';

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                await Auth.login(user, pass);
                window.location.href = 'admin.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
