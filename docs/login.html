<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Elite - GYM PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
        }

        .cyber-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cyber-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-input:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .btn-cyber {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }

        .btn-cyber:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Cyber Background -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[120px] animate-float"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: -3s;"></div>

    <div class="max-w-md w-full cyber-card rounded-[48px] p-8 md:p-12 relative z-10 animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600/10 rounded-3xl mb-6 group">
                <i class="fas fa-bolt text-2xl text-blue-500 group-hover:scale-125 transition-transform duration-500"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white italic mb-1">GYM <span class="text-blue-500 not-italic">PRO</span></h1>
            <p id="form-subtitle" class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Elite Management OS</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <!-- Register Specific -->
            <div id="register-fields" class="hidden space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombre Completo</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" id="full_name" class="w-full pl-14 pr-6 py-4 cyber-input rounded-3xl font-bold text-sm" placeholder="Ej: Frank Montiel">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Dominio Gym</label>
                    <div class="relative">
                        <i class="fas fa-globe absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" id="domain" class="w-full pl-14 pr-6 py-4 cyber-input rounded-3xl font-bold text-sm" placeholder="mi-gym.com">
                    </div>
                </div>
            </div>

            <!-- Common -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Corporativo</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="email" id="email" required class="w-full pl-14 pr-6 py-4 cyber-input rounded-3xl font-bold text-sm" placeholder="admin@gym.com">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock-open absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" required class="w-full pl-14 pr-6 py-4 cyber-input rounded-3xl font-bold text-sm" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-5 btn-cyber text-white rounded-3xl font-black uppercase tracking-[0.2em] text-xs active:scale-95">
                <span id="btn-text">Acceder al Sistema</span>
                <span id="btn-loading" class="hidden"><i class="fas fa-sync-alt animate-spin mr-3"></i> Procesando...</span>
            </button>
        </form>

        <!-- Toggle -->
        <div class="mt-10 text-center">
            <button id="toggle-mode" class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] hover:text-blue-300 transition-all border-b border-blue-900/50 pb-1">
                ¿Nuevo aquí? Registrar Gimnasio
            </button>
        </div>

        <!-- Feedback -->
        <div id="status-msg" class="hidden mt-8 p-5 rounded-3xl text-[10px] font-black uppercase tracking-widest text-center animate-fade-in border border-white/5">
            <!-- Inyectado dinámicamente -->
        </div>
    </div>

    <!-- Footer -->
    <div class="fixed bottom-8 left-0 right-0 text-center">
        <p class="text-[9px] text-slate-600 font-black uppercase tracking-[0.4em]">Wisbe Integration Platform &copy; 2026</p>
    </div>

    <script type="module">
        import { Auth, showPopup } from './js/utils.js';

        const form = document.getElementById('auth-form');
        const statusMsg = document.getElementById('status-msg');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-mode');
        const registerFields = document.getElementById('register-fields');
        const formSubtitle = document.getElementById('form-subtitle');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            statusMsg.classList.add('hidden');
            if (isLogin) {
                formSubtitle.innerText = 'Elite Management OS';
                btnText.innerText = 'Acceder al Sistema';
                toggleBtn.innerText = '¿Nuevo aquí? Registrar Gimnasio';
                registerFields.classList.add('hidden');
            } else {
                formSubtitle.innerText = 'Registro de Partner Wisbe';
                btnText.innerText = 'Activar Plataforma';
                toggleBtn.innerText = '¿Ya tienes cuenta? Login';
                registerFields.classList.remove('hidden');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            try {
                if (isLogin) {
                    await Auth.login(email, pass);
                    window.location.href = 'admin.html';
                } else {
                    const full_name = document.getElementById('full_name').value.trim();
                    const domain = document.getElementById('domain').value.trim();

                    if (!full_name) throw new Error('El nombre es obligatorio');

                    await Auth.register(email, pass, {
                        full_name,
                        domain,
                        role: 'gym-owner'
                    });

                    await showPopup('¡Éxito!', 'Cuenta creada. Revisa tu email para confirmar y luego inicia sesión.');

                    isLogin = true;
                    formSubtitle.innerText = 'Elite Management OS';
                    btnText.innerText = 'Acceder al Sistema';
                    toggleBtn.innerText = '¿Nuevo aquí? Registrar Gimnasio';
                    registerFields.classList.add('hidden');

                    statusMsg.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Revisa tu email para confirmar tu cuenta';
                    statusMsg.className = 'mt-8 p-5 rounded-3xl text-[10px] font-black uppercase tracking-widest text-center animate-fade-in bg-blue-500/10 text-blue-400 border border-blue-500/20';
                    statusMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                let msg = err.message;

                if (msg.includes('CONFIRMAR TU EMAIL')) {
                    msg = 'DEBES CONFIRMAR TU CORREO PARA ENTRAR. Revisa tu inbox.';
                } else if (msg.includes('Invalid login credentials')) {
                    msg = 'Credenciales no válidas. Verifica tus datos.';
                } else if (msg.includes('SINCRONIZACIÓN')) {
                    // This error is now rare but good to keep clear
                    msg = `ERROR DE SINCRONIZACIÓN: REVISA EL SQL EDITOR EN SUPABASE.<br><span class="text-[8px] opacity-60 mt-2 block">TIP: COPIA BDD.TXT EN TU SQL EDITOR Y EJECÚTALO PARA REPARAR EL VÍNCULO.</span>`;
                }

                statusMsg.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i> ${msg}`;
                statusMsg.className = 'mt-8 p-5 rounded-3xl text-[10px] font-black uppercase tracking-widest text-center animate-fade-in bg-red-500/10 text-red-400 border border-red-500/20';
                statusMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
