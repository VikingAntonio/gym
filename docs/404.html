<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo... - Wisbe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="text-center animate-fade">
        <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl font-black mx-auto mb-6 shadow-xl shadow-blue-600/20">
            W
        </div>
        <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase mb-2">Redirigiendo a tu Tarjeta</h1>
        <p class="text-slate-500 font-medium flex items-center justify-center gap-2">
            <i class="fas fa-spinner fa-spin"></i> Un momento por favor...
        </p>
    </div>

    <script>
        (function() {
            // Reserved words that should redirect to their .html version instead of a card
            const reserved = [
                'index', 'login', 'gym', 'beauty', 'independientes', 'store',
                'panelWisbe', 'adminUsuarios', 'cards', 'pricing', 'nutricion',
                'rutinas', 'entrenadores', 'beautyCitas', 'adminStoreConfig',
                'adminStoreInventory', 'adminStorePromos', 'adminStoreAuctions',
                'adminEntrenadores', 'adminNutricion', 'adminRutinas', 'tarjetas'
            ];

            // Get path segments and remove empty ones (handles trailing slashes)
            const segments = window.location.pathname.split('/').filter(p => p.length > 0);
            const lastSegment = segments[segments.length - 1];

            if (!lastSegment || lastSegment === 'index.html' || lastSegment === '404.html') {
                window.location.href = '/index.html';
                return;
            }

            // Remove .html for check
            const cleanPath = lastSegment.replace('.html', '');

            if (reserved.includes(cleanPath)) {
                // If it's a reserved page name without .html, redirect to the .html version
                window.location.href = '/' + cleanPath + '.html';
            } else {
                // Otherwise, treat it as a username for the digital card
                window.location.href = '/cards.html?u=' + lastSegment;
            }
        })();
    </script>
</body>
</html>
