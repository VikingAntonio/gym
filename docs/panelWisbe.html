<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Maestro Wisbe - Selección</title>
    <link rel="icon" type="image/png" sizes="1662x604" href="./assets/img/iconwisbe.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body data-theme="dark" class="bg-[#1a1a1a] min-h-screen flex flex-col items-center justify-center p-6">
    <nav id="main-nav" class="hidden"></nav>

    <div class="container max-w-[1000px] w-full text-center">
        <div class="logo-container mb-12 animate-fade">
            <a href="index.html">
                <img src="./assets/img/wisbelogo.png" alt="Wisbe Logo" class="w-52 mx-auto drop-shadow-[4px_4px_8px_#0f0f0f]">
            </a>
        </div>

        <h1 class="text-xl font-black text-white/80 uppercase tracking-[0.2em] mb-12 animate-fade">Panel Maestro - Selecciona un Sistema</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fade-in">
            <!-- Gestión Global (Wisbe Admin only) -->
            <a href="adminUsuarios.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-people-fill text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Usuarios Globales</span>
            </a>

            <!-- Gym System -->
            <a href="gym.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-activity text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Wisbe Gym</span>
            </a>

            <!-- Beauty System -->
            <a href="beauty.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-scissors text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Wisbe Beauty</span>
            </a>

            <!-- Independientes -->
            <a href="independientes.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-person-workspace text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Independientes</span>
            </a>

            <!-- Contruccion -->
            <a href="independientes.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-building text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Construcción</span>
            </a>

            <!-- Tienda -->
            <a href="independientes.html" class="neu-card p-10 flex flex-col items-center justify-center group hover:text-[#ff6b00]">
                <i class="bi bi-bag-check text-5xl mb-4 transition-transform group-hover:-translate-y-2"></i>
                <span class="font-bold tracking-widest uppercase text-sm">Tienda</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { Auth } from './assets/js/utils.js';

        // Security check
        const user = await Auth.checkAccess(['gym-admin']);
        if (!user) {
             window.location.href = 'login.html';
        }
    </script>
</body>
</html>
