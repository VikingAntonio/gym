<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Wisbe</title>
    <link rel="icon" type="image/png" sizes="1662x604" href="./assets/img/iconwisbe.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/styleGYM.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="neu-page min-h-screen">
    <button class="theme-toggle" id="themeToggle" title="Cambiar Tema">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <nav id="main-nav"></nav>

    <div class="container mx-auto px-4 py-12 text-center">
        <div class="mb-12 animate-fade">
            <a href="index.html">
                <img src="https://wisbe.xyz/assets/img/wisbelogo.png" class="h-20 mx-auto mb-4 filter drop-shadow-lg" alt="Wisbe Logo">
            </a>
        </div>

        <h1 class="text-2xl font-black uppercase tracking-widest opacity-80 mb-12">Panel Wisbe</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 animate-fade">
            <!-- Usuarios Globales -->
            <a href="adminUsuarios.html" class="neu-card p-10 group">
                <i class="fas fa-users-cog text-5xl mb-6"></i>
                <span class="text-lg font-bold uppercase tracking-widest">Usuarios</span>
            </a>

            <!-- Wisbe Gym -->
            <a href="gym.html" class="neu-card p-10 group">
                <i class="fas fa-dumbbell text-5xl mb-6"></i>
                <span class="text-lg font-bold uppercase tracking-widest">Wisbe Gym</span>
            </a>

            <!-- Wisbe Beauty -->
            <a href="beauty.html" class="neu-card p-10 group">
                <i class="fas fa-magic text-5xl mb-6"></i>
                <span class="text-lg font-bold uppercase tracking-widest">Wisbe Beauty</span>
            </a>

            <!-- Independientes -->
            <a href="independientes.html" class="neu-card p-10 group">
                <i class="fas fa-id-card text-5xl mb-6"></i>
                <span class="text-lg font-bold uppercase tracking-widest">Independientes</span>
            </a>

            <!-- Wisbe Store -->
            <a href="store.html" class="neu-card p-10 group">
                <i class="fas fa-shopping-bag text-5xl mb-6"></i>
                <span class="text-lg font-bold uppercase tracking-widest">Wisbe Store</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { renderNavbar, Auth, initTheme } from './assets/js/utils.js';

        // Security check: only admins or wisbe business unit
        const user = await Auth.checkAccess(['gym-admin']);

        renderNavbar();
        initTheme();
    </script>
</body>
</html>
