<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo Profesional - Plataforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav id="main-nav"></nav>

    <header class="bg-white border-b border-slate-200 py-16 text-center">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Equipo Profesional</h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Conecta con los mejores especialistas para transformar tu proceso.</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16">
        <div id="trainers-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Loading -->
            <div class="animate-pulse bg-white rounded-[32px] p-8 border border-slate-200 h-96"></div>
            <div class="animate-pulse bg-white rounded-[32px] p-8 border border-slate-200 h-96"></div>
            <div class="animate-pulse bg-white rounded-[32px] p-8 border border-slate-200 h-96"></div>
            <div class="animate-pulse bg-white rounded-[32px] p-8 border border-slate-200 h-96"></div>
        </div>
    </main>

    <!-- Modal para contacto -->
    <div id="contact-modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full relative animate-fade-in shadow-2xl border border-white">
            <button id="close-modal" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600 transition-colors">
                <i class="fas fa-times-circle text-2xl"></i>
            </button>
            <div id="modal-content" class="text-center">
                <!-- Inyectado dinámicamente -->
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, renderNavbar } from './js/utils.js';
        renderNavbar();

        const modal = document.getElementById('contact-modal');
        const modalContent = document.getElementById('modal-content');
        const closeModal = document.getElementById('close-modal');

        closeModal.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        async function loadTrainers() {
            const container = document.getElementById('trainers-container');
            const params = new URLSearchParams(window.location.search);
            const domain = params.get('domain');

            let query = supabase.from('gym_trainers').select('*').order('created_at', { ascending: false });

            if (domain) {
                const { data: userData } = await supabase.from('gym_users')
                    .select('id')
                    .ilike('domain', domain.trim())
                    .eq('role', 'gym-owner')
                    .maybeSingle();

                if (userData) {
                    query = query.eq('owner_id', userData.id);
                } else {
                    container.innerHTML = `<p class="text-slate-400 col-span-full text-center py-20 italic">No se encontraron especialistas en el dominio especificado.</p>`;
                    return;
                }
            }

            const { data, error } = await query;

            if (error) {
                container.innerHTML = `<p class="text-red-500 col-span-full">Error al cargar el equipo: ${error.message}</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-slate-400 col-span-full text-center py-20 italic">No hay profesionales registrados actualmente.</p>`;
                return;
            }

            container.innerHTML = data.map(trainer => `
                <div class="bg-white rounded-[32px] p-8 border border-slate-200 group hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center">
                    <div class="w-32 h-32 rounded-[24px] overflow-hidden border-4 border-slate-50 shadow-md mb-8">
                        <img src="${trainer.image_url || 'https://images.unsplash.com/photo-1594381898411-846e7d193883?auto=format&fit=crop&q=80&w=687'}" alt="${trainer.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">${trainer.name}</h3>
                    <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-6">${trainer.specialty}</span>
                    <p class="text-sm text-slate-500 mb-8 line-clamp-3 leading-relaxed">${trainer.bio || 'Sin descripción disponible.'}</p>
                    <button onclick="window.selectTrainer('${trainer.name}', '${trainer.contact_info}')" class="w-full bg-slate-50 group-hover:bg-slate-900 group-hover:text-white text-slate-600 py-4 rounded-2xl font-bold transition-all border border-slate-100 uppercase tracking-widest text-[10px]">
                        Contactar
                    </button>
                </div>
            `).join('');
        }

        window.selectTrainer = (name, contact) => {
            modalContent.innerHTML = `
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-3xl">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 mb-2">Información de Contacto</h3>
                <p class="text-slate-500 mb-8 font-medium">Conéctate con <strong>${name}</strong> para iniciar tu proceso.</p>
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                    <p class="text-xl font-bold text-slate-800 break-words">${contact || 'No especificado'}</p>
                </div>
                <button onclick="document.getElementById('contact-modal').classList.add('hidden')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase tracking-widest text-[10px] hover:bg-blue-600 transition-colors">Cerrar</button>
            `;
            modal.classList.remove('hidden');
        };

        loadTrainers();
    </script>
</body>
</html>
